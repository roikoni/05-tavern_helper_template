,"x":60.78,"y":54.76},{"name":"云岫州","aliases":[],"x":46.68,"y":40.7},{"name":"河朔州","aliases":[],"x":59.91,"y":39.83},{"name":"太虚剑宗","aliases":[],"x":38.82,"y":49.17},{"name":"玄冰宫","aliases":[],"x":48.39,"y":19.98},{"name":"天机阁","aliases":[],"x":35.16,"y":68.55},{"name":"万法门","aliases":[],"x":62.36,"y":57.87},{"name":"丹霞宗","aliases":[],"x":40.31,"y":79.97},{"name":"碧落宫","aliases":[],"x":61.55,"y":45.98},{"name":"镇岳宗","aliases":[],"x":39.61,"y":37.34},{"name":"天渊关口","aliases":[],"x":36.3,"y":37.83},{"name":"莫尔迦领地","aliases":[],"x":24.24,"y":33.14},{"name":"血煞宗","aliases":[],"x":18.04,"y":36.83},{"name":"幽魂谷","aliases":[],"x":19.09,"y":52.37},{"name":"万象魔宗","aliases":[],"x":32.46,"y":55.72},{"name":"无属沙海","aliases":[],"x":26.29,"y":59.44},{"name":"北海渔港","aliases":[],"x":68.12,"y":16.11},{"name":"玄冰城","aliases":[],"x":46.75,"y":22.05},{"name":"克茜拉的废弃渔村","aliases":[],"x":64.87,"y":13.72},{"name":"炉山镇","aliases":[],"x":59.73,"y":66.84},{"name":"百草城","aliases":[],"x":57.24,"y":74.46},{"name":"斯芬克丝的道观","aliases":[],"x":36.09,"y":74.24},{"name":"丹火秘境","aliases":[],"x":67.73,"y":74.07},{"name":"人妖共治城邦","aliases":[],"x":66.81,"y":48.6},{"name":"青木城","aliases":[],"x":70.08,"y":45.01},{"name":"万妖林","aliases":[],"x":73.08,"y":57.16},{"name":"诸侯七国","aliases":[],"x":71.29,"y":37.39},{"name":"无主之地","aliases":[],"x":81.28,"y":48.46},{"name":"无尽海","aliases":[],"x":45.5,"y":52.97}],"locations":[{"name":"虚空古城","aliases":["古城","虚空城"],"region":"西漠以西","type":"秘境","color":"#8a7fd1","description":"漂浮在西漠外海空间裂隙中的无人古城。建筑不属于任何已知时代，城中偶有疑似异界科技的遗物。","x":11.99,"y":55.46},{"name":"幽冥渊","aliases":["冥渊"],"region":"东南无尽海","type":"禁地","color":"#b05b7a","description":"东荒与南岭外海的无底深渊，早在上古便被列为天阶禁地。传闻渊中埋藏着难以计数的灵石。","x":87.49,"y":86.69},{"name":"剑墟秘境","aliases":["剑墟"],"region":"中州西部","type":"秘境","color":"#79a8b8","description":"太古剑修大能的葬剑之地，万剑沉眠于此。秘境位于太虚剑宗近旁，每隔一月开启一次。","x":37.73,"y":49.86},{"name":"万妖林","aliases":["妖王庭"],"region":"东荒","type":"妖族领地","color":"#5f9b68","description":"东荒深处的妖族核心领地，妖王庭坐落其中。妖王之下三大部族分治林海，入内须遵守妖族规矩。","x":71.52,"y":59.88},{"name":"莫尔迦领地","aliases":["莫尔迦绿洲","绿洲"],"region":"西漠","type":"古神领地","color":"#d08a68","description":"天渊裂谷以北的中立绿洲，由古神莫尔迦守护。这里禁止战火、奴役、血祭与旧日崇拜，也是污染外溢时的庇护地。","x":26.5,"y":37.08},{"name":"玄冰宫","aliases":["冰宫"],"region":"北冥","type":"正道宗门","color":"#75b9cf","description":"北冥唯一大宗，门人专修冰系功法。宗门依冰山孤城而建，长期与世隔绝，行事神秘低调。","x":48.62,"y":21.07},{"name":"玄冰城","aliases":["北冥玄冰城"],"region":"北冥","type":"城池","color":"#75b9cf","description":"依玄冰宫所在冰山而建的北冥孤城，也是北冥少数长期有人聚居的大型城池。","x":46.75,"y":22.05},{"name":"天京城","aliases":["天京","大虞都城"],"region":"中州京畿","type":"都城","color":"#d2ad5f","description":"大虞都城与大陆最大城市，凡城区、灵城区并立。万象坊和灵台司总部皆设于此，是五域商路与权力的中心。","x":49.61,"y":53.64},{"name":"云岫州","aliases":["云岫"],"region":"中州西部","type":"州域","color":"#7fa9a0","description":"紧邻天渊关口的前沿辎重州。云岫坊市是关内最大补给点，镇岳宗山门位于州境西南。","x":46.71,"y":41.97},{"name":"临江州","aliases":["临江"],"region":"中州南部","type":"州域","color":"#6f9fc2","description":"中州南部的水运与粮赋重镇。临江关把控通往南岭的水路，码头水帮盘踞，消息往来极快。","x":44.58,"y":63.55},{"name":"东平州","aliases":["东平","东平洲"],"region":"中州东部","type":"州域","color":"#c8a267","description":"中州通往东荒的缓冲州，凡人聚居稠密，也是大虞马政所在。万法门山门位于州境南部。","x":60.46,"y":56.17},{"name":"河朔州","aliases":["河朔"],"region":"中州北部","type":"州域","color":"#a58d72","description":"抵近北冥的寒铁产区，常年驻有边军抵御南下妖兽。碧落宫山门位于州境南部的药王谷。","x":59.84,"y":41.54},{"name":"天渊关口","aliases":["天渊关","天渊关外"],"region":"中州与西漠交界","type":"关隘","color":"#c77a52","description":"大虞名义疆界的西端，也是正魔对峙前线。商队、逃亡者和灰色走私通道在此汇流。","x":36.61,"y":38.8},{"name":"百草城","aliases":["百草"],"region":"南岭","type":"城池","color":"#7da66a","description":"南岭最大的药材集散城市。名义上隶属大虞，税官、城防与律法实际上皆由丹霞宗掌管。","x":55.9,"y":76.53},{"name":"青木城","aliases":["青木"],"region":"东荒西部","type":"城池","color":"#67976e","description":"诸侯七国之首，也是散修猎妖者的主要集散地。城中盛行妖兽材料与灵草交易。","x":70.96,"y":46.38},{"name":"北海渔港","aliases":["北海港","渔港"],"region":"北冥北海沿岸","type":"港口","color":"#5f91ad","description":"北冥少数有人聚居的自治渔港。这里没有官府与税收，居民推举长者裁决纠纷，民风淳朴而封闭。","x":68.09,"y":17.04},{"name":"克茜拉的废弃渔村","aliases":["克茜拉废村","废弃渔村","潮灯守望地"],"region":"北冥北海沿岸","type":"管制区","color":"#708493","description":"北海渔港以北的旧日污染隔离站与潮灯守望地。村下仍有污染裂口，未经天机阁或玄冰宫许可不得进入。","x":64.76,"y":14.64},{"name":"???","aliases":[],"region":"北冥","type":"未明地点","color":"#929292","description":"北冥冰原上的未命名标记。现有记录不足，其性质与风险等级均有待确认。","x":62.67,"y":23.09},{"name":"斯芬克丝的道观","aliases":["斯芬克丝道观","废弃道观"],"region":"南岭群山","type":"古神居所","color":"#9a83b8","description":"丹霞宗辖区边缘的废弃道观，古神斯芬克丝已在此隐居二百年。其能力主要用于安抚并隔绝精神污染。","x":35.96,"y":75.26},{"name":"炉山镇","aliases":["炉山"],"region":"南岭","type":"城镇","color":"#c8794b","description":"不隶属任何宗门的炼器师自治镇，以“不打炉子的人不交税”闻名，是散修炼器师落脚学艺的首选。","x":59.83,"y":68.33},{"name":"天机阁","aliases":["天机"],"region":"中州南缘","type":"正道宗门","color":"#7380b8","description":"精研阵法与推演之术，号称算尽天机。阁中收藏修仙界最完整的典籍，坐落于中州与南岭交界附近。","x":35.15,"y":70.04},{"name":"太虚剑宗","aliases":["太虚","剑宗","苍云峰","太虚剑宗山下"],"region":"中州西部","type":"正道宗门","color":"#8fa9bd","description":"天下剑修祖庭，以太虚剑诀名震修仙界。山门设于中州西部苍云峰，近旁便是剑墟秘境。","x":39.49,"y":49.75},{"name":"碧落宫","aliases":["碧落","药王谷"],"region":"中州东北部","type":"正道宗门","color":"#70a894","description":"以医道入世、悬壶济世的正道宗门，掌握顶尖的疗伤续命之术。山门位于河朔州南部药王谷。","x":61.32,"y":47.5},{"name":"人妖共治城邦","aliases":["共治城邦","人妖城邦"],"region":"东荒缓冲带","type":"城邦","color":"#6da58f","description":"由两族混血者建立、由人族与妖族共同管理的贸易城邦，是东荒少数秩序平和的情报与商贸枢纽。","x":66.72,"y":49.55},{"name":"万法门","aliases":["万法","万法山"],"region":"中州东南部","type":"正道宗门","color":"#7e86c5","description":"法术研究圣地，藏有品类最全的功法秘籍。宗门主张万法归宗、兼容并蓄，山门位于东平州南部。","x":62.45,"y":59.27},{"name":"镇岳宗","aliases":["镇岳","铁岳"],"region":"中州西北部","type":"正道宗门","color":"#a8875e","description":"体修正统，以肉身对抗天地。门人虽少却战力惊人，山门位于云岫州西南的铁岳山脉。","x":39.72,"y":38.37},{"name":"万象魔宗","aliases":["万象魔宗辖区","魔宗"],"region":"西漠东部","type":"魔道宗门","color":"#875a9e","description":"主张以魔证道，认为魔道同样可通大道。宗门行事偏激却不以滥杀为准则，在天渊关外维持一方秩序。","x":32.53,"y":57.28},{"name":"幽魂谷","aliases":["幽魂谷辖区"],"region":"西漠","type":"魔道宗门","color":"#7d6a9d","description":"精通神魂秘术与傀儡炼制的魔道宗门，擅长驱使亡者。谷主据说已存世五千年。","x":18.79,"y":53.52},{"name":"血煞宗","aliases":["血煞宗辖区"],"region":"西漠","type":"魔道宗门","color":"#b64f55","description":"以血炼之法快速提升修为的魔道宗门，被正道视为公敌。宗门行事残忍，却以严苛门规约束门人。","x":18.8,"y":36.98},{"name":"丹霞宗","aliases":["丹霞","丹霞山"],"region":"南岭","type":"正道宗门","color":"#c96f57","description":"修仙界炼丹第一宗，掌握大量高阶丹药法门，并实际控制百草城。与各大宗门均有深厚利益往来。","x":40.2,"y":82.21},{"name":"丹火秘境","aliases":["丹火"],"region":"南岭","type":"秘境","color":"#d65d48","description":"天生地火汇聚而成的地阶秘境，内部温度极高，盛产万年火灵芝，是丹修眼中的修行圣地。","x":67.57,"y":75.02}]}'),pn=JSON.parse('{"version":2,"factions":{"虞朝":{"颜色":"#c6a664","描述":"","显示":true},"太虚剑宗":{"颜色":"#c6a664","描述":"","显示":true},"镇岳宗":{"颜色":"#c6a664","描述":"","显示":true},"碧落宫":{"颜色":"#c6a664","描述":"","显示":true},"丹霞宗":{"颜色":"#c6a664","描述":"","显示":true},"万法门":{"颜色":"#c6a664","描述":"","显示":true},"天机阁":{"颜色":"#c6a664","描述":"","显示":true},"玄冰宫":{"颜色":"#c6a664","描述":"","显示":true},"血煞宗":{"颜色":"#c6a664","描述":"","显示":true},"幽魂谷":{"颜色":"#c6a664","描述":"","显示":true},"万象魔宗":{"颜色":"#c6a664","描述":"","显示":true},"斯芬克丝":{"颜色":"#c6a664","描述":"","显示":true},"莫尔迦":{"颜色":"#d08a68","描述":"","显示":true},"妖族":{"颜色":"#5f9b68","描述":"","显示":true},"诸侯七国":{"颜色":"#67976e","描述":"","显示":true}},"regions":{"西漠":{"势力":"","颜色":"#c6a664","透明度":0.22,"描述":"","顶点":[{"x":35.99,"y":37.21},{"x":35.55,"y":35.88},{"x":34.83,"y":35.38},{"x":34.43,"y":35.22},{"x":33.81,"y":34.83},{"x":33.28,"y":34.83},{"x":32.34,"y":33.83},{"x":31.97,"y":33.67},{"x":31.25,"y":32.61},{"x":30.88,"y":32.45},{"x":30.57,"y":31.62},{"x":30.5,"y":30.45},{"x":30.41,"y":30.12},{"x":30.16,"y":29.29},{"x":29.48,"y":28.41},{"x":28.82,"y":26.91},{"x":28.45,"y":26.36},{"x":28.04,"y":26.25},{"x":27.3,"y":25.42},{"x":27.11,"y":24.36},{"x":26.92,"y":23.31},{"x":26.8,"y":22.87},{"x":26.58,"y":22.32},{"x":26.21,"y":22.04},{"x":25.68,"y":21.93},{"x":25.55,"y":21.93},{"x":25.12,"y":21.87},{"x":24.4,"y":22.2},{"x":24.24,"y":22.48},{"x":23.96,"y":22.92},{"x":23.84,"y":24.25},{"x":23.93,"y":25.08},{"x":24.06,"y":25.86},{"x":24.06,"y":26.36},{"x":23.84,"y":26.8},{"x":23.56,"y":26.91},{"x":23,"y":26.08},{"x":22.84,"y":25.53},{"x":22.84,"y":23.98},{"x":22.87,"y":23.
