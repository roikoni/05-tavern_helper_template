"aliases":["冥渊"],"region":"东南无尽海","type":"禁地","color":"#b05b7a","description":"东荒与南岭外海的无底深渊，早在上古便被列为天阶禁地。传闻渊中埋藏着难以计数的灵石。","x":87.49,"y":86.69},{"name":"剑墟秘境","aliases":["剑墟"],"region":"中州西部","type":"秘境","color":"#79a8b8","description":"太古剑修大能的葬剑之地，万剑沉眠于此。秘境位于太虚剑宗近旁，每隔一月开启一次。","x":37.73,"y":49.86},{"name":"万妖林","aliases":["妖王庭"],"region":"东荒","type":"妖族领地","color":"#5f9b68","description":"东荒深处的妖族核心领地，妖王庭坐落其中。妖王之下三大部族分治林海，入内须遵守妖族规矩。","x":71.52,"y":59.88},{"name":"莫尔迦领地","aliases":["莫尔迦绿洲","绿洲"],"region":"西漠","type":"古神领地","color":"#d08a68","description":"天渊裂谷以北的中立绿洲，由古神莫尔迦守护。这里禁止战火、奴役、血祭与旧日崇拜，也是污染外溢时的庇护地。","x":26.5,"y":37.08},{"name":"玄冰宫","aliases":["冰宫"],"region":"北冥","type":"正道宗门","color":"#75b9cf","description":"北冥唯一大宗，门人专修冰系功法。宗门依冰山孤城而建，长期与世隔绝，行事神秘低调。","x":48.62,"y":21.07},{"name":"玄冰城","aliases":["北冥玄冰城"],"region":"北冥","type":"城池","color":"#75b9cf","description":"依玄冰宫所在冰山而建的北冥孤城，也是北冥少数长期有人聚居的大型城池。","x":46.75,"y":22.05},{"name":"天京城","aliases":["天京","大虞都城"],"region":"中州京畿","type":"都城","color":"#d2ad5f","description":"大虞都城与大陆最大城市，凡城区、灵城区并立。万象坊和灵台司总部皆设于此，是五域商路与权力的中心。","x":49.61,"y":53.64},{"name":"云岫州","aliases":["云岫"],"region":"中州西部","type":"州域","color":"#7fa9a0","description":"紧邻天渊关口的前沿辎重州。云岫坊市是关内最大补给点，镇岳宗山门位于州境西南。","x":46.71,"y":41.97},{"name":"临江州","aliases":["临江"],"region":"中州南部","type":"州域","color":"#6f9fc2","description":"中州南部的水运与粮赋重镇。临江关把控通往南岭的水路，码头水帮盘踞，消息往来极快。","x":44.58,"y":63.55},{"name":"东平州","aliases":["东平","东平洲"],"region":"中州东部","type":"州域","color":"#c8a267","description":"中州通往东荒的缓冲州，凡人聚居稠密，也是大虞马政所在。万法门山门位于州境南部。","x":60.46,"y":56.17},{"name":"河朔州","aliases":["河朔"],"region":"中州北部","type":"州域","color":"#a58d72","description":"抵近北冥的寒铁产区，常年驻有边军抵御南下妖兽。碧落宫山门位于州境南部的药王谷。","x":59.84,"y":41.54},{"name":"天渊关口","aliases":["天渊关","天渊关外"],"region":"中州与西漠交界","type":"关隘","color":"#c77a52","description":"大虞名义疆界的西端，也是正魔对峙前线。商队、逃亡者和灰色走私通道在此汇流。","x":36.61,"y":38.8},{"name":"百草城","aliases":["百草"],"region":"南岭","type":"城池","color":"#7da66a","description":"南岭最大的药材集散城市。名义上隶属大虞，税官、城防与律法实际上皆由丹霞宗掌管。","x":55.9,"y":76.53},{"name":"青木城","aliases":["青木"],"region":"东荒西部","type":"城池","color":"#67976e","description":"诸侯七国之首，也是散修猎妖者的主要集散地。城中盛行妖兽材料与灵草交易。","x":70.96,"y":46.38},{"name":"北海渔港","aliases":["北海港","渔港"],"region":"北冥北海沿岸","type":"港口","color":"#5f91ad","description":"北冥少数有人聚居的自治渔港。这里没有官府与税收，居民推举长者裁决纠纷，民风淳朴而封闭。","x":68.09,"y":17.04},{"name":"克茜拉的废弃渔村","aliases":["克茜拉废村","废弃渔村","潮灯守望地"],"region":"北冥北海沿岸","type":"管制区","color":"#708493","description":"北海渔港以北的旧日污染隔离站与潮灯守望地。村下仍有污染裂口，未经天机阁或玄冰宫许可不得进入。","x":64.76,"y":14.64},{"name":"???","aliases":[],"region":"北冥","type":"未明地点","color":"#929292","description":"北冥冰原上的未命名标记。现有记录不足，其性质与风险等级均有待确认。","x":62.67,"y":23.09},{"name":"斯芬克丝的道观","aliases":["斯芬克丝道观","废弃道观"],"region":"南岭群山","type":"古神居所","color":"#9a83b8","description":"丹霞宗辖区边缘的废弃道观，古神斯芬克丝已在此隐居二百年。其能力主要用于安抚并隔绝精神污染。","x":35.96,"y":75.26},{"name":"炉山镇","aliases":["炉山"],"region":"南岭","type":"城镇","color":"#c8794b","description":"不隶属任何宗门的炼器师自治镇，以“不打炉子的人不交税”闻名，是散修炼器师落脚学艺的首选。","x":59.83,"y":68.33},{"name":"天机阁","aliases":["天机"],"region":"中州南缘","type":"正道宗门","color":"#7380b8","description":"精研阵法与推演之术，号称算尽天机。阁中收藏修仙界最完整的典籍，坐落于中州与南岭交界附近。","x":35.15,"y":70.04},{"name":"太虚剑宗","aliases":["太虚","剑宗","苍云峰","太虚剑宗山下"],"region":"中州西部","type":"正道宗门","color":"#8fa9bd","description":"天下剑修祖庭，以太虚剑诀名震修仙界。山门设于中州西部苍云峰，近旁便是剑墟秘境。","x":39.49,"y":49.75},{"name":"碧落宫","aliases":["碧落","药王谷"],"region":"中州东北部","type":"正道宗门","color":"#70a894","description":"以医道入世、悬壶济世的正道宗门，掌握顶尖的疗伤续命之术。山门位于河朔州南部药王谷。","x":61.32,"y":47.5},{"name":"人妖共治城邦","aliases":["共治城邦","人妖城邦"],"region":"东荒缓冲带","type":"城邦","color":"#6da58f","description":"由两族混血者建立、由人族与妖族共同管理的贸易城邦，是东荒少数秩序平和的情报与商贸枢纽。","x":66.72,"y":49.55},{"name":"万法门","aliases":["万法","万法山"],"region":"中州东南部","type":"正道宗门","color":"#7e86c5","description":"法术研究圣地，藏有品类最全的功法秘籍。宗门主张万法归宗、兼容并蓄，山门位于东平州南部。","x":62.45,"y":59.27},{"name":"镇岳宗","aliases":["镇岳","铁岳"],"region":"中州西北部","type":"正道宗门","color":"#a8875e","description":"体修正统，以肉身对抗天地。门人虽少却战力惊人，山门位于云岫州西南的铁岳
