---
商路:
  总述: 修仙界商路以中州天京城万象坊为总枢纽，向四域辐射。灵石、灵草、丹药、妖兽材料、法器皆沿商路流转。商路既是散修跑商谋生的命脉，也是各方势力设卡抽税、刺探情报的战场
  主干商路:
    中州—南岭药路:
      走向: 天京城万象坊 → 临江州临江关 → 南岭百草城 → 丹霞宗药田
      货物: 南岭灵草、丹药北运；中州灵石、法器、粮赋南下
      关卡: 临江关由大虞水师把控，按货值抽一成。百草城税官实为丹霞宗的人，对外来商旅另收"药引税"
      危险段: 临江州水路有水帮盘踞，需打点或结伴。南岭山区偶有妖兽袭扰商队
      特点: 五域最繁忙、最安全的商路。丹霞宗与朝廷在此利益交织，故治安最好

    中州—东荒猎妖路:
      走向: 天京城 → 东平州 → 东荒诸侯七国 → 青木城 → 万妖林外围
      货物: 妖兽皮骨、妖丹、灵草西运入中州；中州法器、丹药、盐铁东运
      关卡: 东平州边境由大虞边军设卡，查禁军械外流。诸侯七国各自设卡，过一国交一税
      危险段: 越往东越凶险。万妖林外围有高阶妖兽出没，猎妖者商队需有金丹期以上护卫
      特点: 利润最高也最危险。东荒分舵的散修多在此跑商或接护卫委托

    中州—西漠走私路:
      走向: 天京城 → 云岫州 → 天渊关口 → 西漠万象魔宗辖区
      货物: 正道禁售的功法、丹药、阵盘流入魔道；魔道独有的血炼材料、傀儡、毒物流入正道
      关卡: 天渊关口是正魔对峙前线，名义上禁绝商旅。实际靠灵台司、散修联盟、万象魔宗三方默许的灰色通道放行
      危险段: 天渊关口随时因正魔摩擦封闭。关外无属沙海段有亡命之徒劫掠，亦有古神莫尔迦领地的辐射区
      特点: 时断时续，利润与风险皆极致。西漠分舵赖此为生

    中州—北冥补给路:
      走向: 天京城 → 河朔州 → 北方边境关口 → 北冥玄冰城 → 北海渔港
      货物: 中州灵石、丹药、御寒法器北运；北冥寒铁、海兽材料、深海灵物南运
      关卡: 北方边境关口由河朔州边军与玄冰宫共管。玄冰宫不收税，但禁止外人深入冰原腹地
      危险段: 北冥冰原修士稀少、补给困难，寒潮可冻杀筑基期以下。无尽海沿岸五十里为克茜拉禁区，须绕行
      特点: 运量最小但单品价值高。北冥灵石购买力最强，跑一趟顶中州数趟

  无商路之地:
    无尽海: 出海探索者大多未归，无固定商路。仅有零星渔船近海作业
    荒古遗迹以东: 东荒最深处无主之地，无政权、无秩序，不计入商路
    古神领地: 莫尔迦绿洲自有内部经济，不接入外域商路。维拉的宴会随其游走，所到之处短期繁荣，无固定路线
