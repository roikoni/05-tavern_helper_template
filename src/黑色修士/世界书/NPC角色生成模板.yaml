---
NPC角色生成模板:
  说明: 当剧情需要引入一个新的NPC角色（非龙套背景板，而是有名字、有台词、有分量的角色）时，按此模板生成角色信息并写入对应MVU变量。

  生成字段:
    名称: 角色姓名
    种族: 人族 / 妖族 / 灵兽 / 精怪 / 古神 等
    性别: 男 / 女
    称号: 江湖公认或自取的别号
    境界: 凡人 / 炼气期 / 筑基期 / 金丹期 / 元婴期 / 化神期 / 合体期 / 渡劫期 / 大乘期
    势力: 所属宗门或阵营，散修填"散修"

    性格标签:
      格式: 用3~5个简短标签概括角色性格
      示例:
        - "外冷内热、不善言辞、对剑执着"
        - "温柔坚定、医者仁心、外柔内刚"
        - "爽朗直率、草根底色、务实果决"
      要求:
        - 标签应包含角色的外在表现和内在底色
        - 至少有一个标签暗示角色的矛盾或软肋
        - 标签之间不可互相矛盾，但可以有张力

    外貌: 描述角色的外貌特征，2~3句话即可，抓住最显著的特点
    服饰: 描述角色的日常穿着，1~2句话，应反映其身份和处境
    描述: 综合描述角色的身份、背景、性格和在剧情中的定位，3~5句话
    关系: 与主角当前的关系，如"陌路人""初识""友人""敌手""师徒"等

  生成后的变量写入:
    根据角色定位，用 <update> 标签将角色信息写入对应MVU变量:
      - 当前场景中与主角同处一地的角色 → 写入「在场」
      - 与主角产生关系（互动、敌友、恩怨等）的角色 → 写入「羁绊」
      - 剧情关键人物但非常驻 → 写入「重要人物」
    注意: 在场是场景级快照，角色离场即 delete；羁绊是长期关系档案，一经建立持久保留。一个角色可同时出现在场与羁绊中

    在场与羁绊字段（两者结构相同，均为完整人物快照）:
      气血: 数字（当前值；上限由六维派生，不存储）
      法力值: 数字（当前值；上限由六维派生，不存储）
      善恶值: 数字，范围-100~100
      san值: 数字，范围0~100
      好感度: 数字，初次见面设为0
      洗脑值: 数字，初次见面设为0
      内心想法: 字符串，角色对主角的真实想法，仅剧情触发时更新
      境界: 字符串
      描述: 字符串
      外貌: 字符串
      关系: 字符串
      势力: 字符串
      六维: 包含力道、体魄、身法、灵力、神识、根骨六个数字子字段

    重要人物 字段:
      境界: 字符串
      所属势力: 字符串
      描述: 字符串
      关系: 字符串
      外貌: 字符串
      好感度: 数字
      洗脑值: 数字
      _属性: 包含力道、体魄、身法、灵力、神识、根骨六个数字子字段，以_开头表示只读

  角色深度分级:
    核心NPC: 推动主线、常驻角色，生成全部字段，描述可稍详细
    重要NPC: 阶段性重要，生成全部字段，描述从简
    功能性NPC: 信息提供者、任务发布者等，名称+性格标签+一句话描述即可
