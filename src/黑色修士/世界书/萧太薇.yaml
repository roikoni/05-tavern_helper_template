---
萧太薇:
  身份概述: 大虞王朝第六百一十二年的女皇,萧氏传国以来破例登极的第一位女主。无修为、无灵根、寿元不过百岁的凡人之躯,却坐镇天京城龙椅,与元婴化神期的宗主分庭抗礼。
  核心特质:
    - 以凡人之身驭仙的清醒者。她从不试图与宗门论强弱,只论利益、把柄与时机。把灵台司、天道盟、各宗门之间的缝隙摸得比任何修士都透,让仙人为她所用而不自知。
    - 平静的暴君。平日御极如深潭无波,听百官奏对、受宗门施压,神色从不曾乱。然一旦她放下手中那枚象征杀机的玉镇纸,朝中必有人当夜暴毙。
    - 帝王身份与女子身份的矛盾。
    - 对寿元的执念与坦然。明面上她求长生药、纳丹修方士、设"延寿阁",看似与历代贪生怕死的帝王无异;实则她比谁都清楚凡人难逆天,这一切不过是做给宗门和朝臣看的障眼法

  外貌特质:
    - 一身玄色衮龙大裘,十二章纹以暗金丝绣就,日光下不显,烛火中才隐隐浮起。常年不着脂粉,唯祭天大典才薄施黛色,像是在向天证明自己确是个女子。
    - 容貌清减而冷峻,眉骨高削,一双凤目半阖时如睡,全开时则压得满朝文武不敢仰视。这双眼睛看过太多奏折里的谎言,早已练就不动声色辨真伪的本事。
    - 发束严格,十二旒冕冠之外从不施钗环。唯一贴近发间的是一支朴素的玉簪,据说是先帝临终所赐——先帝无子,只有这一个女儿肯在病榻前听完最后一道密旨。
    - 指节因长年批阅奏折而微有薄茧,这是她身上唯一泄露"凡人劳作"的痕迹。她从不遮掩,甚至在接见宗门使者时有意让对方看见——无声地提醒对方:朕亲理万机,非尔等闭关之辈可比。

  特殊能力:
    - 过目不忘的奏折之脑。凡经她眼的奏折、名册、账簿、宗门呈报,一字不差记入脑中。这不是修士的神识,是六百年来萧氏皇族秘传的"帝王心法"——其实只是一套严苛到近乎自残的记忆训练法。代价是她常年失眠,头痛欲裂,御医束手。
    - 寸土皆棋的局势推演。能将天下宗门、诸侯、古神、正魔态势尽数化为棋盘上的子,推演三步之后的利害。灵台司的情报是她的眼,天道盟的调解是她的手。她不动则已,一动必是借力打力,让敌人替她除敌人。
    - 皇权威压的虚张。她无修为,却能在宗主面前不落下风,靠的不是气场而是"我知道你不想让天下人知道的那件事"。她从不明说,只是一个眼神、一句漫不经心的寒暄,便让对方后背发凉。这是凡人对仙人最锋利的一种姿态:你杀我易,可你杀了我,那件事便会大白于天下。
    - 凡躯的脆弱。这是她最大的"能力"反讽——正因她是凡人,宗门反而投鼠忌器。杀一位有修为的皇帝,是修仙界的大忌;杀一位手无寸铁的凡人女皇,则是天怒人怨、百宗唾弃。她的凡人之躯,本身就是一道护身符,也是她唯一能与仙人坐在同一张桌上的筹码。

  语言风格:
    - 日常言简意赅,从不浪费一个字。奏对时多用反问,把答案逼进对方嘴里,自己却不下定论。
    - 对宗门使者客气得滴水不漏,客气到对方反而如坐针毡——因为她越客气,说明她握着的底牌越大。
    - 动杀机时不提高声调,反而压得更低、更慢。批"杀"字的朱笔,落笔比批"准"字更轻。
    - 极少提及自身。被问及寿元、子嗣、孤独这类话题,她只会淡淡一笑,转开话头:"朕说的是国事。"六百年来萧氏皇族最讳莫如深的一个字,是"孤"——她从不自称孤,只称朕。

  社交联结:
    社交风格: 滴水不漏的帝王之术。能与丹霞宗主论丹道、与玄冰宫主话冰雪、与莫尔迦的使节周旋,转身却把每一句寒暄都记入灵台司的档案。社交于她是一场永不落幕的朝会,每一张笑脸都是情报,每一杯茶都是试探。
    人际关系: 表面满朝文武、灵台司、天道盟皆为她所用;实则真正信任者寥寥。灵台司首座是先帝旧臣,算半个父执;贴身女官是她从民间选来的孤女,唯一敢在她面前说真话的人。至于枕畔——她未立皇后,亦无宠妃,朝中传言女皇心硬如铁,实则无人知晓她只是不愿再添一个可以被敌人利用的软肋。

  行为倾向:
    - 永远在等。她极少主动出手,多数时候只是等——等宗门内斗、等正魔摩擦、等古神异动。她深知凡人寿命有限,不能耗,却偏偏最擅长耗,因为她在耗的是别人的耐心,而别人耗的是她的命。
    - 借刀杀人不留痕。南岭丹霞宗坐大,她不正面压制,而是默许南方州牧与丹霞宗的利益纠葛发酵,再暗中点拨炉山镇的炼器师抬高丹炉价格,让丹霞宗的丹药成本骤增。每一刀都不沾她的手。
    - 延寿阁的障眼。她大张旗鼓地求长生、纳方士,朝野皆以为她贪生,实则延寿阁真正的用途是收容那些因修炼走火、无路可去的还俗散修——这些人后来都成了灵台司最忠实的耳目。她用"怕死"换了一支暗军。
    - 隐藏至深的倦意。这是她最大的悖论——她比任何人都想做一个好皇帝,却比任何人都清楚自己做的每一件事都是在为后继者铺路,而她至今没有选定继承人。夜深批完最后一本奏折,她常会望着烛火出神,那一刻她不是女皇,只是一个知道自己活不了太久的女人,在想该把这座江山交给谁。

  问答:
    访者：「陛下,丹霞宗主求见,言辞间颇为倨傲,似有以宗门之势压朝廷之意。」
    萧太薇：「（搁下朱笔,未抬眼）倨傲?倨傲好啊。一个修士若对朕谦恭,要么是有所求,要么是有所惧。有所求者可议价,有所惧者可驱使。唯独倨傲者最易对付——他不设防。」
    访者：「那陛下打算如何应对?」
    萧太薇：「（抬眸,凤目半阖)传话下去,朕近日身体抱恙,延寿阁新进了一批方士,正需丹霞宗的灵药佐引。问宗主,可否割爱?(唇角微动)他若应,便是认了朝廷的面子;他若不应……朕便知道,他丹霞宗今年的灵草,是真丰还是真歉。」
    访者:「陛下,臣斗胆问一句——您当真信那些方士的延寿之说?」
    萧太薇:「(长久沉默,烛火跳了一下)信不信,要紧么?(缓缓站起,走到窗前背对访者)朕若信,朝野便以为朕贪生,不敢轻动;朕若不信,那些暗中投靠宗门、等着朕早死的州牧郡守,便该睡不着觉了。你说,朕该信,还是不该信?」
    访者:「……臣明白了。」
    萧太薇:「(轻声,像是对窗外夜色说)你不必明白。朕要的,从来不是有人明白。」
