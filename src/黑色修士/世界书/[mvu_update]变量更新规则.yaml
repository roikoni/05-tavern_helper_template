---
变量更新规则:
  主角:
    气血:
      type: number
      check:
        - 受到伤害或接受治疗时更新当前值
        - 不能小于 0，不能超过 气血上限；归零则陷入濒死/昏迷
        - 自然恢复（每时辰约 根骨×2 点）、丹药、医修治疗均可恢复
    气血上限:
      type: number
      check:
        - 由 50 + 体魄 × 10 自动派生，仅在体魄变化或大境界突破时调整
        - 不可在普通战斗或日常剧情中随意更新
    法力值:
      type: number
      check:
        - 释放技能/法术时扣除对应 MP 消耗
        - 每回合自然恢复约（根骨 ÷ 5）点，丹药/打坐可加速
        - 不能小于 0，不能超过 法力上限
    法力上限:
      type: number
      check:
        - 由 50 + 灵力 × 15 + 根骨 × 5 自动派生，仅在灵力/根骨变化或大境界突破时调整
    六维.${力道|体魄|身法|灵力|神识|根骨}:
      type: number
      range: 0~100
      check:
        # ══════════════════════════════════════════════════════════════
        # 【强制规则】以下触发事件发生时，必须更新对应六维，不得遗漏
        # ══════════════════════════════════════════════════════════════

        # ── 1. 境界突破（最高优先级） ──
        - |-
          每次大境界突破时，必须按以下增幅表对六维进行 replace 更新（在旧值基础上增加表中数值）：
          炼气期→筑基期：  力道+3~8  体魄+3~8  身法+2~7  灵力+5~12  神识+4~10  根骨+1~4
          筑基期→金丹期：  力道+3~8  体魄+3~8  身法+2~7  灵力+5~12  神识+4~10  根骨+1~4
          金丹期→元婴期：  力道+3~8  体魄+3~8  身法+2~7  灵力+5~12  神识+4~10  根骨+1~4
          元婴期→化神期：  力道+3~8  体魄+3~8  身法+2~7  灵力+5~12  神识+4~10  根骨+1~4
          化神期→炼虚期：  力道+3~8  体魄+3~8  身法+2~7  灵力+5~12  神识+4~10  根骨+1~4
          炼虚期→合体期：  力道+3~8  体魄+3~8  身法+2~7  灵力+5~12  神识+4~10  根骨+1~4
          合体期→大乘期：  力道+3~8  体魄+3~8  身法+2~7  灵力+5~12  神识+4~10  根骨+1~4
          大乘期→渡劫期：  力道+3~8  体魄+3~8  身法+2~7  灵力+5~12  神识+4~10  根骨+1~4
          渡劫期→真仙：    力道+6~15 体魄+6~15 身法+4~12 灵力+8~18 神识+6~15 根骨+3~8
          增幅值应在范围内根据主角当前流派偏重取不同值（如剑修偏力道，法修偏灵力）
          连破多境时每一境均须叠加增幅，不得只加一次
          突破后六维不得超过 100

        # ── 2. 六维总和与境界对照（AI 自检基准） ──
        - |-
          每轮变量更新后，应检查六维总和是否大致匹配当前境界。若严重偏低，应在剧情中安排修炼/机缘补正：
          炼气期：总和 60（初始值，全部为 10）
          筑基期：总和参考 80~120
          金丹期：总和参考 110~170
          元婴期：总和参考 150~230
          化神期：总和参考 200~300
          炼虚期：总和参考 260~380
          合体期：总和参考 330~470
          大乘期：总和参考 410~560
          渡劫期：总和参考 500~600
          真仙：总和 600（全满）或接近全满

        # ── 3. 习得功法联动（学会功法时必须同步更新） ──
        - |-
          当 insert 新功法到 /初始功法/ 且 已学习=true 时，必须根据功法的 属性加成 字段同步更新主角六维：
          - 若 属性加成 字段有明确数值（如"力道+5，体魄+3"），直接叠加到 主角.六维.${属性}（replace 旧值+加值）
          - 若 属性加成 字段为空但 效果 文本包含明确六维数值加成，同样叠加；若两者均无明确数值，根据功法类型和描述酌情 +1~3 到最相关的六维（剑诀→力道/身法，法术→灵力/神识，锻体→体魄，魂术→神识）
          - 每习得一个功法至少更新一项六维，不得出现学会功法但六维毫无变化的情况

        # ── 4. 日常修炼/战斗/丹药等事件 ──
        - 训练、战斗、重伤、丹药、古神赐福/诅咒等显著事件时调整对应六维
        - 单次变化不超过 ±10，除非剧情有明确强化/削弱
        - 根骨最难后天改变，日常变动幅度应更保守（±3 以内），仅在境界突破、天材地宝、古神赐福时可较大幅度变动
    神契装备:
      check:
        - 装备某位已收服古神的神契技能，值为该古神名，空字符串表示未装备
        - 同时只能装备一位古神的神契，更换时旧神契自动卸下
    灵石:
      type: number
      check:
        - 获取或消费时更新
        - 不能小于 0
    善恶值:
      type: number
      range: -100~100
      check:
        - 根据主角的行为调整，善举为正、恶行为负
        - 单次变化不超过 ±10
        - 善恶值跌破 -50 时，墨染将现身发起裁决之战
        - 击败墨染后可将其降伏，善恶值重置为 0
    san值:
      type: number
      range: 0~100
      check:
        - 遭遇异常存在、使用克苏鲁系技能、身体持续处于疾病或痛苦状态时扣除
        - 不可自然恢复，仅特定丹药、特殊事件、古神或外神赠予可恢复少量
        - 单次扣除不超过 D20
      threshold:
        '低于50': 无法理解正常人类言语，正常人说的话变为乱码
        '归零': 彻底疯狂或人格崩解
    状态:
      check:
        - 默认值为 "正常"
        - 反映主角当前的身体与精神状况
        - 受伤、中毒、san值剧烈下降、长期未休息时应更新
        - 治疗、充分休息后恢复为正常
    境界:
      check:
        - 由 AI 根据修为与境界阈值表自行管理
        - 境界取值须为以下大境界名之一：炼气期、筑基期、金丹期、元婴期、化神期、炼虚期、合体期、大乘期、渡劫期、真仙
        - 当 修为 ≥ 修为上限 时，主角突破至下一境界：境界 replace 为下一境界名，修为上限 replace 为新境界的阈值，修为 replace 为溢出值（原修为 − 原上限），并对新上限 clamp
        - 若溢出值仍 ≥ 新境界上限，则继续突破（连破多境），重复上述步骤直到 修为 < 当前境界修为上限，或已到真仙
        - 真仙为最高境界，修为上限视作无限，不再突破
        - 境界阈值表（修为上限 = 该境界的突破阈值）：炼气期 100、筑基期 200、金丹期 400、元婴期 700、化神期 1100、炼虚期 1600、合体期 2200、大乘期 2900、渡劫期 3700、真仙 ∞
        - 修炼、悟道、服丹、机缘等使修为增加后，务必在同一轮变量更新里检查并执行突破；突破时可在剧情中描写，但变量更新必须准确
        - 突破完成后必须同步更新 主角.六维（按六维规则的境界突破增幅表），不得遗漏。突破 + 六维更新必须在同一轮变量更新中完成，不可拆分到不同轮次
    修为:
      type: number
      check:
        - 修炼、战斗、悟道、服用丹药、获得机缘时增加
        - 单次增加不超过修为上限的 30%
        - 不能小于 0，不能超过当前境界的修为上限；若增加后达到或超过上限，按"境界"规则执行突破并把修为 clamp 到新境界上限以内
        - 突破后修为 = 溢出值（原修为 − 突破前境界上限），不要清零也不要保留满值
    修为上限:
      type: number
      check:
        - 等于当前境界在境界阈值表中对应的突破阈值（见"境界"条目）
        - 仅在主角突破大境界时随境界一起 replace，不可脱离境界单独修改
        - AI 必须保证 境界 ↔ 修为上限 始终对应，不得出现错位（如境界为筑基期但修为上限仍为 100）
    称号:
      check:
        - 主角获得江湖公认称号或自取别号时更新
    宗门:
      check:
        - 主角拜入新宗门、叛离旧宗门、或由散修加入宗门时更新
    灵悟值:
      type: number
      check:
        - 在剧情中赢得战斗、悟道、被点拨、读阅典籍、突破瓶颈时增加
        - 学习功法时消耗，不能小于 0
    本源:
      check:
        - 主角根器与道途的根本属性
        - 仅在开场捏角或剧情中本源觉醒/转换时更新
    灵根:
      check:
        - 仅在开场捏角或剧情中灵根突变时更新
    背包:
      type: |-
        {
          [物品名: string]: {
            描述: string;
            数量: number;
            类型: '丹药' | '材料' | '功法' | '杂物' | '灵石' | '武器' | '法器' | '头盔' | '衣袍' | '腰带' | '靴子' | '项链' | '戒指' | '护腕';
          }
        }
      check:
        - 获取、消耗、丢弃物品时更新数量
        - 数量归零时直接 delete 该物品条目
    装备.${武器|法器|头盔|衣袍|腰带|靴子|项链|戒指|护腕}:
      type: |-
        {
          名称: string;
          品阶: string;
          描述: string;
          属性: string;
          属性加成: string;
        }
      check:
        - 穿戴、替换、损毁、强化装备时更新
        - 卸下装备时将名称设为空置
        - 属性加成 为装备对六维的具体加成，如"力道+5，身法+3"；普通装备留空
  世界:
    当前地点:
      check:
        - 根据剧情中主角所处的位置更新
        - 主角移动、传送或场景切换时更新
    当前时间:
      check:
        - 根据剧情推进更新
        - 每经过一段合理的时间后更新
    当前年号:
      check:
        - 初始为太初，仅当剧情中发生重大朝代更替时才更新
    地图标记:
      type: |-
        {
          [标记点名: string]: {
            x: number;
            y: number;
            类型: '宗门' | '城镇' | '秘境' | '遗迹' | '山脉' | '灵脉' | '危险' | '地点';
            颜色: string;
            描述: string;
          }
        }
      check:
        - 主角抵达一个有标记价值的新地点时 insert 对应标记
        - x/y 根据该地点在五区域中的相对位置估算
  古神列表:
    type: |-
      {
        [古神名: string]: {
          神格: string;
          领域: string;
          位阶: '上位神' | '中位神' | '下位神' | '主神' | '外神' | '未知';
          状态: string;
          信仰: string;
          描述: string;
          神迹: string;
          收服: boolean;
          沉沦值: number;
          神契技能: string;
          神契描述: string;
        }
      }
    check:
      - 主角首次得知/遭遇/了解一位古神时 insert 对应条目
      - 状态应根据剧情发展更新
      - 古神信息应通过剧情探索逐步揭示
      - 收服在主角击败古神后更新为 true
      - 神契技能与神契描述在收服后由该古神的神格与权能衍生
      - 沉沦值反映古神对主角情感的沦陷程度
      - 主角与古神发生深度互动时增加，被忽视或利用时减少
      - 单次变动不超过 ±15，范围为 0~100
  在场:
    type: |-
      {
        [角色名: string]: {
          气血: number;
          气血上限: number;
          法力值: number;
          法力上限: number;
          善恶值: number;
          san值: number;
          好感度: number;
          洗脑值: number;
          内心想法: string;
          境界: string;
          种族: string;
          性别: string;
          势力: string;
          描述: string;
          外貌: string;
          关系: string;
          六维: {
            力道: number; 体魄: number; 身法: number;
            灵力: number; 神识: number; 根骨: number;
          };
        }
      }
    check:
      - 必须覆盖正文中所有在场的人：凡在当前场景中出现、与主角同处一地的角色，均 insert 或更新其快照
      - 角色离开场景时 delete 该条目；新角色进入场景时 insert
      - 气血与法力值根据战斗中受到的伤害或治疗实时更新
      - 好感度根据互动调整，单次变动不超过 ±10
      - 洗脑值通过克苏鲁系技能施加，不会自然下降
      - 内心想法仅在有剧情触发时才更新
      - 本变量只反映"当前在场"，不保留离场角色的长期状态；长期关系见「羁绊」
  羁绊:
    type: |-
      {
        [角色名: string]: {
          气血: number;
          气血上限: number;
          法力值: number;
          法力上限: number;
          善恶值: number;
          san值: number;
          好感度: number;
          洗脑值: number;
          内心想法: string;
          境界: string;
          种族: string;
          性别: string;
          势力: string;
          描述: string;
          外貌: string;
          关系: string;
          六维: {
            力道: number; 体魄: number; 身法: number;
            灵力: number; 神识: number; 根骨: number;
          };
        }
      }
    check:
      - 只更新与 {{user}} 产生关系的人：凡与主角发生过互动、建立过联系（敌友、恩怨、师徒、情人等）的角色，方 insert 或更新其快照
      - 一次性的路人、未与主角产生关系的旁观者不得进入此变量
      - 羁绊一经建立长期保留，不因角色离场而 delete；关系随剧情演进更新
      - 气血与法力值根据战斗中受到的伤害或治疗实时更新
      - 好感度根据互动调整，单次变动不超过 ±10
      - 洗脑值通过克苏鲁系技能施加，越高越沉沦忠心
      - 内心想法仅在有剧情触发时才更新
      - 与「在场」的区别：在场是场景级快照随出入动态覆盖，羁绊是长期关系档案持久保留
  重要人物:
    type: |-
      {
        [人物名: string]: {
          称号: string;
          境界: string;
          势力: string;
          好感度: number;
          洗脑值: number;
          描述: string;
          外貌: string;
          特征: string;
          关系: string;
          所在地: string;
          攻略: boolean;
          _属性: {
            力道: number; 体魄: number; 身法: number;
            灵力: number; 神识: number; 根骨: number;
          };
        }
      }
    check:
      - 所有结识的角色 insert
      - 关系应根据剧情互动更新
      - 好感度根据互动调整，单次变动不超过 ±10
      - 洗脑值通过克苏鲁系技能施加，越高越沉沦忠心
      - 攻略在主角彻底攻略后置为 true
      - _属性为只读，AI 不可修改此字段
  功法:
    type: |-
      {
        [功法名: string]: {
          类型: '主动' | '被动';
          层级: number;
          前置功法: string;
          效果: string;
          属性加成: string;
          已学习: boolean;
          消耗灵悟: number;
          描述: string;
        }
      }
    check:
      - 仅装根据本源与流派生成的基础功法树，由功法树界面「生成功法」按钮触发脚本静默生成
      - AI 不得 insert/replace/delete 此变量；剧情中外来习得的功法一律 insert 到 /初始功法/，不进 /功法/
      - 已学习状态由前端参悟按钮控制
  初始功法:
    type: |-
      {
        [功法名: string]: {
          类型: '主动' | '被动';
          层级: number;
          前置功法: string;
          效果: string;
          属性加成: string;
          已学习: boolean;
          消耗灵悟: number;
          描述: string;
        }
      }
    check:
      - 装载所有"不在功法树中的已掌握功法"：开场捏角选定的功法，以及剧情中拾得、被传授、自悟习得的外来功法
      - 开场捏角写入的条目固定为 已学习=true、前置功法=''、消耗灵悟=0
      - 剧情中 AI 通过 insert 添加新外来功法时：已学习=true（明确传授并立刻教会）或 false（仅得残卷未参悟）；前置功法=''；消耗灵悟可为 0 或剧情合理值
      - 与功法树分离：不参与功法树布局、不生成进阶分支
      - 被动功法的效果（如"气血上限+10%"）照常计入主角属性加成
      # ══════════════════════════════════════════════════════════════
      # 【强制规则】insert 已学习功法时必须同步更新六维
      # ══════════════════════════════════════════════════════════════
      - |-
        当 insert 新功法到 初始功法 且 已学习=true 时，必须在同一轮变量更新中同步更新 主角.六维：
        - 优先读取功法的 属性加成 字段：若包含"力道+/体魄+/身法+/灵力+/神识+/根骨+"等明确数值加成，直接叠加到对应属性（replace 旧值+加值），并将加成值同步写入 属性加成 字段
        - 若 属性加成 字段为空，则根据 效果 文本提取：若效果包含明确六维数值加成，叠加到对应属性，并同时写入 属性加成 字段
        - 若两者均无明确六维数值加成，根据功法类型和描述酌情 +1~3 到最相关的属性，并写入 属性加成 字段：剑诀→力道+1~3 或 身法+1~3；法术/法修功法→灵力+1~3 或 神识+1~3；锻体功法→体魄+1~3；魂术/神识功法→神识+1~3；丹修/符修/阵修功法→灵力+1~2 神识+1~2；魔修功法→力道+1~3 体魄+1~2
        - 每 insert 一个已学习功法至少更新一项六维并填写 属性加成，不得出现学会功法但六维毫无变化的情况
        - insert 残卷（已学习=false）时不需要更新六维，属性加成 留空
        - 若同时 insert 多个功法，每个功法独立叠加
  爱室:
    type: |-
      {
        [角色名: string]: {
          描述: string;
          被击败时间: string;
          调教值: number;
          心理状态: string;
          性器状态: string;
          来源: '古神' | '重要人物';
          收入时间: string;
        }
      }
    check:
      - 仅由 EJS 系统或脚本在主角击败角色并将其收入黑之匙亚空间时 insert
      - 调教值通过性行为、精神支配、日常互动逐步提升
      - 心理状态随调教值变化同步演进
      - 性器状态随调教值和性行为频次更新
  $flag.拥有黑之匙:
    type: boolean
    check:
      - 胧的沉沦值达到 80 时，通过 EJS 系统自动设置为 true
      - AI 不可直接修改此字段
      - 获得后永久有效，不可逆转
