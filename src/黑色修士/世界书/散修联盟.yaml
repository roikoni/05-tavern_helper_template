---
散修联盟:
  定位: 修仙界最大的散修互助组织。将天下七成无门无派的散修捏合成连正道七宗都无法忽视的庞然大物。详见 [[柳不移]]
  规模: 数万散修。从炼气期到金丹期皆有，元婴期以上寥寥。联盟是散修唯一可依靠的集体，但并非铁板一块，各域分舵因地利不同而各有脾气
  组织结构:
    总盟: 设于中州天京城外的散修坊市。盟主柳不移坐镇，下设庶务、情报、刑律三堂。重大决策由盟主一锤定音，三堂执行
    分舵: 五域各设分舵，舵主由总盟任命。分舵是散修接触联盟的日常窗口：接任务、领丹药、报伤亡、求庇护皆由此
      中州分舵: 总盟直管。最大的一舵，杂事最多。详见出身地"散修联盟分舵"
      东荒分舵: 以猎妖者为主。与诸侯七国、万妖林均有贸易往来，是联盟最富的一舵
      南岭分舵: 多为丹修器修散修。与丹霞宗、炉山镇关系密切，靠手艺吃饭
      西漠分舵: 最危险的一舵。常驻万象魔宗辖区边缘，做正魔两道的走私与情报生意
      北冥分舵: 最小的一舵。人少地广，主要为过往散修提供补给与求救信标
  入盟:
    门槛: 不论灵根品级、不论修为高低。唯一规矩是不得背盟、不得以凡人为修炼材料
    入门仪: 由分舵舵主或长老面见，登名册。名册一式两份，分舵与总盟各存一份。柳不移会亲自过目新名册，虽不一一接见，但凡有潜质或可疑者，她都记得
    代价: 入盟免费，但接联盟任务须按比例抽成交总盟。抽成用于购置丹药、抚恤阵亡者家眷
  经济来源:
    - 抽成: 成员接宗门外派任务、秘境所得，按一成上交总盟
    - 坊市: 联盟在各域坊市设有自营药铺、器铺、情报铺，是稳定收入
    - 情报: 联盟的情报网是修仙界最密的。出售非敏感情报给宗门与天道盟，是隐性大宗收入
  与各方关系:
    正道七宗: 七宗不认"盟主"二字，只称柳不移为"散修头领"，但岁岁七宗会盟仍邀其赴会。散修占修仙界七成之众，防务秘境皆绕联盟不得。表面客气，实际忌惮其情报网与人数
    魔道四宗: 联盟不主动与魔道为敌，也不替魔道做事。但西漠分舵的走私生意让双方有灰色往来。血煞宗视联盟为肥羊，幽魂谷忌惮其情报网
    天道盟: 联盟是天道盟之外散修唯一可申诉之处。两者在"严禁以凡人为修炼材料"的底线上立场一致，常互通情报
    古神: 联盟对古神持务实态度。不主动接触，但要求各分舵张贴天机阁"古神态势报告"，成员接任务前须确认目的地无红级警告
  底线: 联盟唯一不可触碰的规矩有二：一不得背盟，二不得以凡人为修炼材料。犯前者，柳不移亲手倒茶，随后永久逐出；犯后者，天下共诛，联盟先动手
