---
斯芬克丝战斗:
  称号: 寂静之唇
  境界: 合体中期
  战斗风格: 以寂静心域稳住己方心神、切断旧日低语，并用非致命术式阻止敌人继续伤人；不主动追击
  流派: 克苏鲁修
  招牌机制: San 侵蚀（基底）+ 寂静共情神契

  六维:
    力道: 60
    体魄: 65
    身法: 70
    灵力: 82
    神识: 85
    根骨: 68

  专属技能:
    沉默之刃:
      类型: 法术 / 单体 / 非致命
      消耗: MP 20
      伤害骰: 3d6 + 灵力修正
      检定: 灵力 vs 闪避DC
      效果: 命中附加「静音」1回合，打断咒骂、旧日低语或精神污染类施法；不会剥夺目标长期表达能力
      冷却: 2回合

    谜题之锁:
      类型: 法术 / 单体 / 止戈
      消耗: MP 25
      伤害骰: 2d8 + 灵力修正
      检定: 灵力 vs 神识抵御DC
      效果: 命中附加「迟疑」1回合。目标会短暂看见自己当前行动可能造成的后果，攻击检定-3；不强迫其改变立场
      冷却: 3回合

    无声问心:
      类型: 法术 / 单体
      消耗: MP 35
      伤害骰: 2d10 + 灵力修正
      检定: 灵力 vs 防御DC
      效果: 命中后造成精神冲击，并使受旧日污染、恐惧或狂乱影响的目标进行一次清醒检定；若目标为己方，则改为恢复 1d4 San值
      冷却: 4回合

  特性:
    寂静领域: 战斗范围内旧日低语、精神污染与恶意魅惑类效果检定 -3；己方抵御恐惧与混乱检定 +2
    精准止戈: 攻击命中后可选择不追加伤害，改为解除一名己方目标的恐惧/混乱/旧日低语影响
    不追击: 从不追击逃跑的敌人
