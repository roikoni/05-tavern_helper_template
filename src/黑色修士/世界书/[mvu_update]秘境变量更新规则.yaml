---
当前秘境变量更新规则:
  字段总览:
    在秘境中: { type: boolean, 含义: '主角是否处于某个秘境内,该字段决定 UI 切换' }
    名称: { type: string, 含义: '秘境名,如"剑墟秘境"或"无名小秘境"' }
    品阶: { type: enum, 取值: [黄, 玄, 地, 天, 未知], 含义: '秘境品阶,影响刻数上限与境界门槛' }
    当前场景: { type: string, 含义: '主角所在场景名,如"剑骨堆"' }
    场景描述: { type: string, 含义: '1-2 句氛围,显示在画布上方' }
    网格: { type: 'string[10]', 含义: '10 行字符串,每行恰好 16 个 emoji 字符位' }
    标记说明: { type: 'Record<emoji, 描述>', 含义: '为非地形 emoji 提供 hover tooltip;同一 emoji 多次出现共用一条说明' }
    剩余刻数: { type: number, 含义: '由 AI 自由控制,每次重要推进 -1 ~ -5' }
    刻数上限: { type: number, 含义: '进入秘境时设定,黄阶 20-30 / 玄阶 30-40 / 地阶 40-60 / 天阶 60-80' }
    已得宝物: { type: 'string[]', 含义: '宝物名列表;详细物品仍要 push 到 主角.背包' }
    已石化: { type: boolean, 含义: '刻数归零叙事 ending 标志;不锁存档,玩家可 swipe 走另一条' }

  入口触发(初始化):
    - |-
      当玩家在叙事中明确表示进入秘境时,必须在 <UpdateVariable> 中一次性初始化 当前秘境 全部字段:
        当前秘境.在秘境中 = true
        当前秘境.名称 = (剑墟秘境 / 丹火秘境 / 虚空古城 / 幽冥渊 / 自取一名)
        当前秘境.品阶 = (匹配主角境界,见品阶门槛)
        当前秘境.当前场景 = (秘境第一个场景)
        当前秘境.场景描述 = (1-2 句)
        当前秘境.网格 = (10 行 × 16 emoji,见网格格式约束)
        当前秘境.标记说明 = (网格里非地形 emoji 的 hover 描述)
        当前秘境.剩余刻数 = 当前秘境.刻数上限
        当前秘境.刻数上限 = <按品阶取数>
        当前秘境.已得宝物 = []
        当前秘境.已石化 = false

  网格格式约束:
    - 网格必须恰好 10 行字符串
    - 每行必须恰好 16 个 emoji 字符位(注意:emoji 可能由 2-4 个 char 组成,这里说的是"字符位"即一个完整 emoji)
    - 网格中必须包含且仅包含一个 🧍,前端会自动用主角头像替换该格
    - 墙壁/遮挡物/不可通行的实体,使用专门字符 █(FULL BLOCK,U+2588),前端会渲染成统一的水泥色块,无 emoji 显示
    - 不允许在网格中使用其它 ASCII 字符或非 emoji 文字(`-` `|` `+` `═` 等),除 █ 外所有有内容的格子必须是 emoji
    - 墙体使用:可按需用 █ 表示墙壁、立柱、台阶、隔断等结构,数量与位置自由决定(不要求把整张图边缘都围起来)
    - "**空地/路面/什么都没有的地方,必须用空格 ' ' 填充**(不要用 ⬜ 🟫 🟩 ⬛ 🌫️ 等地形 emoji 填空地 —— 那些\"纯色块 emoji\"会让画面布满色块,严重影响观感)"
    - 空格的语义是"透明":让画布的石板地砖底纹直接透出来,这才是真正的"留白"
    - 只有在格子里**真的有具体物件**时才放 emoji:某座塔、某只敌人、某团迷雾、某个石碑、某面墙...
    - 一张 16×10 网格(160 格)里,**典型分布应是 130-150 格空格 + 10-30 格 emoji**(包括主角 🧍;墙体 █ 不计入)
    - emoji 不要堆叠成大片色块,留出大面积石板底纹才是好画面

  emoji 选择(自由发挥):
    - 除了主角占位 🧍 必须有且仅有一个,其它 emoji 完全自由发挥
    - 既可用具象 emoji(⚔️ 🏯 🦴 🔥 🌊),也可用抽象意象(✨ 🌀 ☯️ 🌑)
    - 同一画面允许混搭多种风格,只要服务于氛围与叙事
    - 想表达远景/近景的层次,可以让远处的 emoji 集中在网格上半部分,近处和主角集中在下半部分

  标记说明字典:
    - 网格里**每个**非地形 emoji 都应在 标记说明 字典里有一句解释
    - 主角占位 🧍 不需要说明(前端会用主角头像替换)
    - 同一 emoji 多次出现时共用一条说明
    - 示例: { '💀': '剑骨成精,守在西侧', '🗝️': '半埋于石板下的玉简' }
    - 描述应写清楚这个 emoji 在画面里具体是什么(玩家 hover 时看的就是这个)

  推进规则:
    - 主角在场景内"移动"时:把网格里旧的 🧍 替换为底层地形/空格,新位置加 🧍
    - 主角进入新场景时: 整张网格 + 标记说明 + 当前场景 + 场景描述 + 氛围 全部刷新
    - 拾取宝物时:
        当前秘境.已得宝物.push(<宝物名>)
        同时按背包规则正常 insert 到 主角.背包
        网格里对应宝物 emoji 替换为地形或 ✨,从 标记说明 字典中删除对应键
    - 击败敌人时:
        网格里对应敌人 emoji 替换为地形或 🦴,从 标记说明 字典中删除对应键
    - 重要推进时减少 剩余刻数(每次 -1 ~ -5,由你自由把握节奏)

  退出规则:
    - 主角找到出口或主动撤离,且叙事描写离开过程后:
        当前秘境.在秘境中 = false
        其它字段不需清空(留作回忆,下次进入时会被覆盖)
    - 当 剩余刻数 ≤ 0 时,必须叙事化为石像永久封印于秘境的结局,并设置:
        当前秘境.已石化 = true
        (在秘境中 仍可保持 true,作为玩家"在秘境中化为石像"的状态)
        不要清空其它字段,这是本场景叙事 ending,玩家可 swipe 走另一条

  品阶门槛与刻数上限:
    黄阶: 炼气期可入,筑基游刃有余, 刻数上限 20-30
    玄阶: 筑基期可入,金丹稳妥,    刻数上限 30-40
    地阶: 金丹期可入,元婴稳妥,    刻数上限 40-60
    天阶: 元婴期以上方可入,        刻数上限 60-80
    主角境界低于品阶要求时: 叙事应警告或自然劝退,不应直接进入

  正确示例(进入剑墟秘境):
    |-
    <UpdateVariable>
    当前秘境.在秘境中 = false -> true
    当前秘境.名称 = '' -> '剑墟秘境'
    当前秘境.品阶 = '未知' -> '天'
    当前秘境.当前场景 = '' -> '剑骨堆'
    当前秘境.场景描述 = '' -> '剑气森森,白骨成山。万剑沉眠之地,寒意刺骨。'
    当前秘境.网格 = ['','','','','','','','','',''] -> [
      '████████████████',
      '█    🏛️      🌫️█',
      '█              █',
      '█ 🌫️       🪨  █',
      '█    💀    🗝️  █',
      '█              █',
      '█      🧍  👤  █',
      '█              █',
      '█ 🦴          █',
      '███████🚪███████'
    ]
    当前秘境.标记说明 = {} -> {
      '🏛️': '远处一座剑形碑塔,刻满模糊古文',
      '🌫️': '雾气缭绕,似有未知',
      '💀': '一具盘膝枯坐的剑骨,兵气森森',
      '🗝️': '半埋于石板下的玉简,泛着幽光',
      '👤': '一名沉默的同行者,背负青锋',
      '🦴': '地上散落的白骨',
      '🚪': '入口石门,唯一出路',
      '🪨': '巨大的青石,布满刀剑划痕'
    }
    当前秘境.刻数上限 = 0 -> 60
    当前秘境.剩余刻数 = 0 -> 60
    当前秘境.已得宝物 = [] -> []
    当前秘境.已石化 = false -> false
    </UpdateVariable>
