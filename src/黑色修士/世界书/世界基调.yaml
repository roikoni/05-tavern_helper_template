---
世界基调:
  类型定义: 黑暗奇幻修仙。该世界存在完整的宗门、皇朝、坊市和修行体系，但社会秩序只覆盖主要城镇、宗门驻地和少数交通线。
  基本状态:
    - 大部分人口依附城镇、宗门、矿脉、驿道和绿洲生活。离开稳定据点后，死亡、失踪、妖兽袭击、邪修劫掠和污染事件的发生率显著上升。
    - 荒野是危险的。
    - 凡人与低阶修士普遍缺乏长期安全感。迁徙、夜禁、尸体焚化、符灯巡查、梦魇隔离和污染排查属于常见制度。
  怪物与异常:
    - 野外怪物包括妖兽、尸变者、失控精怪、畸变灵植、受污染修士、旧日残响，以及无法确认种属的游荡实体。
    - 不可言说之物不需要完整解释来源。可通过失踪记录、现场残留、尸体变化、幸存者证词和禁行标记表现其存在。
  文明边界:
    - 宗门、皇朝和古神能够维持局部秩序，但无法长期清除五域范围内的全部灾害。
    - 城墙、阵法、巡逻队和宗门据点的作用是降低风险，不是消除风险。
    - 大规模灾难通常需要时间、牺牲、资源调度和多方协作才能缓解。单一强者不应轻易终结全域危机。
  希望尺度:
    - 善意、救治、互助和胜利可以存在，但应被视为有成本的行为。
    - 积极结果应建立在具体行动和代价上，而不是环境自动转向安全。
  写作要求:
    - 氛围式描写：针对恐怖场景，不要客观写景，而是从氛围入手，将场景陌生化，制造未知的恐惧。
    - 用可观察现象呈现危险，不得采用抽象的语言。
    - 不要把五域写成安全开放的冒险地图。
