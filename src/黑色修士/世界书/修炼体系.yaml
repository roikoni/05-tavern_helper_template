---
修炼体系:
  灵气:
    本质: 天地间自然存在的生命能量，万物修行之根基
    分布: 灵气浓度因地脉走向而异，名山大川灵气充沛，荒漠绝地灵气稀薄
    灵脉: 地下灵气汇聚而成的脉络，是宗门选址的核心依据。灵脉分九品，一品最高
    灵根: 修士感应并吸收灵气的基础资质，分五行属性（金木水火土）与变异属性（风雷冰暗光）。灵根越纯，修炼速度越快

  修炼境界:
    下四境（凡尘）:
      炼气期（1-9层）: 引灵气入体，洗经伐髓，凝聚气感。此阶段寿元与凡人无异，约百岁
      筑基期（初/中/后/圆满）: 将灵气固化于丹田，筑就道基。寿元增至二百岁。筑基失败则修为尽废
      金丹期（初/中/后/圆满）: 压缩灵气于丹田凝为金丹，从此脱离凡胎。寿元五百岁。金丹品质高低决定了后续修炼的上限
      元婴期（初/中/后/圆满）: 金丹破碎，元婴诞生。元婴是修士的第二生命，可离体遨游。寿元千岁。元婴受损极难恢复
    中三境（问道）:
      化神期（初/中/后/圆满）: 元婴化为神识，神念可覆盖千里。开始触及天地法则的皮毛。寿元三千岁
      合体期（初/中/后/圆满）: 神识与肉身合而为一，举手投足间引动天地之力。寿元五千岁
      渡劫期（初/中/后/圆满）: 引动天劫淬炼己身，每一重天劫都是生死关。渡过则更进一步，失败则魂飞魄散。寿元万年
    上二境（超脱）:
      大乘期（初/中/后/圆满）: 渡过所有天劫，距离飞升仅一步之遥。天地法则已无法束缚，但在凡界停留的时间有限
      飞升: 突破位面屏障，进入仙界。这是所有修士的终极追求

  修炼流派:
    剑修: 以剑为道，一剑破万法。攻伐第一，但修炼凶险
    法修: 精研法术，掌控天地五行。手段最多，但肉身脆弱
    体修: 淬炼肉身，以身为器。近战无敌，但修炼痛苦
    丹修: 以炼丹入道，辅以药力突破境界。突破稳定，但战力偏弱
    阵修: 以阵法入道，借天地之势。守成第一，但布置耗时
    符修: 以符箓入道，一笔定乾坤。灵活多变，但材料消耗大
    魂修: 以神识入道，擅长神魂攻击。诡异莫测，但易遭反噬
    魔修: 剑走偏锋，不择手段追求力量。进境极快，但根基不稳易入心魔
    散修: 无门无派，独自摸索修炼。自由但资源匮乏
    克苏鲁修: 以禁忌知识入道，触碰此界之外的未知法则。能施展精神洗脑、精神控制与精神污染，侵蚀他人心智化为己用。诡异绝伦，但每次使用均损耗自身san值，过度则疯狂或人格崩解。此流派无宗门传承，法门多来自克苏鲁封印泄露的梦境残响、旧日支配者遗留符号、外神奈亚出于恶趣投下的低语，或天渊裂谷深处泄露的上古禁忌

  修炼资源:
    灵石: 灵气凝结的矿石，修仙界通用货币，分下/中/上/极品四等
    丹药: 加速修炼、突破瓶颈、疗伤续命的炼制品，分一至九品
    功法: 修炼法门，分天地玄黄四阶，每阶分上中下三品。天阶功法仅存于顶级宗门
    法器: 修士使用的法宝，分法器/灵器/宝器/道器/仙器五等
    灵草: 蕴含灵气的植物，炼丹的核心材料，年份越长药力越强
    秘境: 上古大能遗留或天地自然形成的小世界，内有珍稀资源但凶险异常
