---
克茜拉战斗:
  称号: 深渊的低语
  境界: 合体中期
  战斗风格: 以潮声净化、海雾隔离与深海屏障封存污染，优先救援与限制失控目标
  流派: 古神神契
  招牌机制: 潮声净化 + 深渊低语神契

  六维:
    力道: 55
    体魄: 62
    身法: 45
    灵力: 88
    神识: 85
    根骨: 70

  专属技能:
    潮汐击:
      类型: 法术 / 单体
      消耗: MP 20
      伤害骰: 2d10 + 灵力修正
      检定: 灵力 vs 闪避DC
      效果: 若目标正受旧日污染驱使，本次攻击可选择造成非致命伤害并使其清醒检定+2
      冷却: 1回合

    深海之拥:
      类型: 法术 / 单体 / 救援
      消耗: MP 30
      检定: 灵力 vs 神识抵御DC
      效果: 指定一名己方或自愿目标获得「海灯护心」2回合；免疫一次恐惧、混乱或旧日低语，并恢复 D6 San值
      冷却: 3回合

    净潮漩涡:
      类型: 法术 / 群体
      消耗: MP 35
      伤害骰: 2d8 + 灵力修正
      检定: 灵力 vs 闪避DC（范围内全体）
      效果: 命中附加「潮网」1回合；敌方移动与追击检定-3，受旧日污染目标额外进行一次清醒检定
      冷却: 4回合

    潮灯低语:
      类型: 被动 / 持续
      效果: 每回合开始前己方与自愿目标对恐惧、混乱、旧日低语的抵御检定+2；敌方旧日污染源的持续效果检定-2
      水域强化: 水边、雨中战斗时净化与封存类检定 DC +4

  特性:
    水域强化: 水边、雨中战斗时所有净化、封存与救援技能 DC +2，潮灯低语覆盖范围翻倍；离开水域后身法 -3
    不追: 不追击逃跑者。若逃者带有旧日污染，克茜拉会留下海灯印记提醒附近修士避险并尝试远程压制污染
    一灯一潮: 优先保护濒临崩溃或被污染驱使的目标，能非致命解决时不取性命
