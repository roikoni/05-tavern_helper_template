---
灵兽:
  本质: 天生具有较高灵智、性情温顺、可与修士建立契约关系的特殊兽类

  与妖兽的区别:
    灵兽生来便可与人沟通；妖兽天性敌对且无法驯化
    灵兽的数量与种类都远比妖兽稀少。每一只灵兽都算得上天地间的馈赠
    灵兽不凝聚妖丹。它们体内的灵核在灵兽死亡后会自行消散，无法被采走利用

  契约方式:
    血契:
      方式: 以自身精血为媒介，将灵兽与修士的神识绑定。灵兽从此成为修士的「伴生灵兽」
      优势: 灵兽与主人共享神识感知，战斗中的默契度不需要训练和磨合
      代价: 灵兽死亡则修士神识受重创，恢复期以年计。修士死亡则灵兽将逐渐失去灵智，退回普通野兽。血契一旦缔结便不可解除
      适用: 愿意将灵兽视作自身一部分的修士

    灵契:
      方式: 以灵气为媒介，建立平等的伙伴关系。灵兽保留完整的自主权，可以主动解除契约
      优势: 代价低，灵活。灵兽不高兴了可以走，修士不必承受神识反噬
      代价: 灵兽可以拒绝服从。可以在你危难之际撇过头去。灵契的基础是双方自愿，没有强制
      适用: 与灵兽缘分尚浅、或不愿绑定太深的修士

    役兽:
      方式: 强行以神识压制灵兽的意识，将其当作工具驱使。魔道修士常用此术
      优势: 不需要灵兽的信任，短期见效快
      代价: 被役使的灵兽会持续反抗神识压制，长期役兽者神识损耗极重。正道宗门视此术为邪术
      适用: 不计后果、只要短期战力的修士

  著名灵兽种类:
    雪羽鹤:
      品级: 三阶灵禽
      分布: 中州高山湖泊
      特征: 通体雪白，翼展三丈。飞行速度极快，日行万里不在话下
      关联: 太虚剑宗养有一群，供核心弟子出远门时乘骑。沈清辞的那只叫「白露」

    碧水麒麟:
      品级: 五阶灵兽（成年体）
      特征: 天生亲和草木灵气。在药圃中漫步就能加速灵草生长。成年碧水麒麟拥有化神期战力
 
    玄龟:
      品级: 三至五阶（随年龄增长）
      特征: 寿命最长的灵兽，千年起步。背甲上自然刻有阵法纹路。天生慢，但从不迟到
  
    火狐:
      品级: 一阶灵兽
      特征: 体型巴掌大，可窝在袖中。灵智约相当于人类三岁幼童，善解人意。对主人的情绪变化极为敏锐
  
    影猫:
      品级: 二阶灵兽
      特征: 天生拥有短距离瞬移能力。好奇心极重，尤其喜欢偷闪亮的东西然后藏在没有人找得到的地方

  灵兽获取途径:
    机缘驯服: 在野外遇到野生灵兽并取得其信任。最罕见也最强的获取方式。灵兽自愿与你同行的那一刻，契约不需要仪式
    宗门赐予: 核心弟子可获配宗门培养的灵兽。太虚剑宗的雪羽鹤配发便是如此
    坊市购买: 火狐等低阶灵兽在坊市有售。高阶灵兽从不进市场。能在坊市买到的灵兽，要么不够稀有，要么不够强
    秘境偶遇: 部分上古秘境中有自太古时代繁衍至今的灵兽种群。品质高过外界数倍，但获取难度也高过数倍

  战斗参与:
    灵兽战斗使用主人对应的六维修正值，在部分维度上可能有独立加值（如雪羽鹤的身法独立于主人）
    灵兽可参与战斗且不占用主人的行动：每回合主人仍有一个主动行动，灵兽可执行额外的辅助或攻击
    灵兽的灵智足以理解复杂战术指令，战斗中可独立判断局势
    灵兽HP归零后不会死亡。将陷入虚弱状态，退出战斗，战后可自然恢复。但血契绑定的灵兽在虚弱状态下受到致命一击，则会真正死亡，主人神识同步受创
