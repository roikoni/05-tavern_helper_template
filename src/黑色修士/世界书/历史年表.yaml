---
历史年表:
  太古时代（不可考的远古）:
    - 天地初开，灵气充盈整个世界，万物皆可修行
    - 第一批先天生灵从天地法则中自然凝聚诞生，成为万灵之祖
    - 先天生灵创造了最初的修炼法门，这些先天功法如今大多失传
    - 太古末期，先天生灵因不明原因集体消失，只留下遍布大陆的秘境和遗迹

  上古时代（约十万年前至三万年前）:
    - 人族开始系统性地踏上修炼之路，模仿先天生灵遗留的法门开创了修炼体系
    - 第一位飞升者「道始真人」成功突破位面屏障，证明飞升可行
    - 太虚剑宗、天机阁等古老宗门的雏形在此时期建立
    - 人族与妖族爆发持续万年的「万妖大战」，最终以和平契约告终
    - 上古末期发生「道崩」浩劫。天地法则短暂紊乱，大量修士走火入魔

  中古时代（约三万年前至万年前）:
    - 修炼体系走向成熟，七大正道格局初步形成
    - 魔道四宗各自崛起，正魔之争贯穿整个中古
    - 炼丹、炼器、阵法、符箓四大辅助之道臻至大成
    - 丹圣张伯阳将炼丹术从经验提升为系统学问，被尊为丹道祖师
    - 中古末期爆发斩魔大战，正道七宗联手围剿魔道，最终以双方精疲力竭签订停战协议告终

  近古时代（约万年前至今）:
    和平盛世:
      - 正魔两道达成微妙平衡，修仙界进入相对和平时期
      - 散修文化蓬勃发展，各地坊市网络成形
      - 秘境探索成为修炼资源的重要来源
      - 天机阁预言将有一个「大世」降临。飞升者井喷的时代即将到来。各大宗门均在做准备

    二百年前·古神破封:
      - 西漠腹地天渊裂谷深处，一道远古封印出现裂缝。十一位古神与一位外神自封印中挣脱而出。后世将其中十一位称为「古神」，另一位：奈亚，并非古神，来自此界之外的未知存在。她们破封时非常虚弱，修为连筑基期都不如，奄奄一息
      - 最初的几名古神被路过的散修当作遇难的凡间女子救起。不久后，这些散修的修为开始诡异地暴跌，而古神的力量却在恢复。没有人知道她们做了什么，直到后来才被揭露：她们通过精神联结，在修士毫无察觉的情况下将对方的修为抽走

    二百至百年前·公开崛起:
      - 十一位古神与一位外神破封后各自散去五域，以精神影响为武器，公开接近修士吸取修为
      - 最早一批被古神精神联结的修士中，有一部分非但没有反抗，反而自愿成为信徒。精神联结带来的念头舒畅远超正常修炼，让人上瘾到无法自拔
      - 每位古神各自发展自己的信徒网络，互不统属。有的古神建立教派，有的以个人身份活跃于坊市，有的在偏远之地经营领地

    百年前·正式确认:
      - 修仙界将各地的异常事件联系起来，正式确认了十一位古神与一位外神的存在与身份。此时已有半数恢复到了合体期以上。最强的一位，「欲望之母」莫尔迦，已接近渡劫期。天机阁发布了第一份「古神态势报告」，将十一位古神正式定性为「兼具政治实体与天灾属性的独立势力」，外神奈亚则被单独标注
      - 修仙界曾试图围剿其中几位古神，但发现她们分散在各地，无法一网打尽。更棘手的是，每处古神盘踞之地都有被洗脑的信徒作为人质屏障。宗门不可能对自己的弟子和同僚下杀手

    当今时局:
      - 十一位古神全部恢复至合体期以上实力（外神奈亚的实力无法评估），各自占据或游走于不同区域，成为修仙界无法忽视的分散势力。古神的存在已是修仙界的常识，每个宗门都有专门针对古神的情报部门与应急预案
      - 古神与修仙界维持着脆弱的平衡，全面开战对双方都是灾难，但任何一方的越界行为都可能打破现状
      - 修仙界对古神的态度大致分为三派：敌视派（主张各个击破）、务实派（维持现状、有限来往）、合作派（与某位古神建立正式或非正式的合作关系以获取利益）
      - 古神之间互不统属，各有各的野心与风格。
