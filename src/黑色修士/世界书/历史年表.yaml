---
历史年表:
  太古:
    - 灵气初生，先天生灵与最早的修炼法门出现。
    - 太古末期，先天生灵集体消失，只留下秘境、遗迹和无法解释的空白地带。

  上古:
    - 人族模仿先天遗法建立修炼体系，妖族同时崛起，万妖大战持续万年。
    - 旧日战争爆发。克苏鲁梦境污染沿海潮与地脉扩散，许多城池在睡梦中互相屠杀，人类修仙文明几近崩溃。
    - 十一古神循星轨降临，协助人类先贤稳定现实边界，并在西漠天渊裂谷建立克苏鲁封印。
    - 战后发生「道崩」余劫，大量修士走火入魔，野外出现第一批无法归类的畸变怪物。

  中古:
    - 正道七宗、魔道四宗与大虞前身逐渐成形，人族把幸存文明缩进城池、山门和坊市。
    - 斩魔大战耗尽正魔两道元气，停战后荒野无人清理，邪祟、妖兽与失控秘境开始吞回旧战场。

  近古:
    - 坊市网络与散修联盟兴起，表面进入相对平衡期；实则各地靠符灯、夜禁、巡山队和尸体焚化维持基本秩序。
    - 天机阁预言「大世」将至，各宗争抢天才与资源，底层修士和凡人被推向更危险的秘境、矿场和边境。

  二百年前·天渊异动:
    - 克苏鲁封印大规模震荡，封印未破，但梦境低语、精神污染与旧日残响重新渗入凡世。
    - 十一古神结束隐匿，重新介入人类社会；外神奈亚也借此现身。
    - 天渊异动后，野外怪物数量明显增加，许多偏远村镇从地图上消失。

  当今:
    - 修仙界仍有宗门、皇朝、坊市和灯火，但世界底色已是生灵涂炭。凡人求活，散修卖命，宗门守住核心地带，荒野则交给怪物与饥饿。
    - 古神与人类维持脆弱平衡；旧日支配者仍是深层威胁；奈亚在诸多身份之间看戏、搅局、投下低语。
