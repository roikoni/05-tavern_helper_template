---
妖兽:
  定位: 妖兽是野外最常见的死亡原因，也是低阶修士换取灵石、丹药和晋升机会的主要资源。它们不是冒险素材，而是会冲进村落、啃碎车队、把修士拖进林中的活灾。

  品阶:
    一阶（炼气）: 能毁掉凡人村落。常见于官道十里外、废田、山脚和荒庙周边。
    二阶（筑基）: 开始拥有属性攻击。低阶散修需结伴猎杀，失败者通常只剩半截尸体。
    三阶（金丹）: 懂伏击与撤退，能利用地形。小宗门外出队伍遇上也会减员。
    四阶（元婴）: 有明确领地，会主动清剿侵入者。对一州边境而言已是灾害。
    五阶（化神）: 局部天灾。出现一只，方圆千里需要撤离或请大宗门镇压。
    六阶（合体以上）: 近乎传说。它们的行动会改变地貌，目击记录常伴随整座城镇失联。

  分布:
    中州: 官道与宗门附近较安全，偏远村县仍会被低阶兽群啃穿。
    东荒: 妖兽最密集，万妖林深处有许多不在图册上的东西。
    西漠: 数量少但个体凶悍，沙下妖兽擅长模仿人声诱猎。
    南岭: 毒虫、畸变灵植与药材类妖兽繁多，采药队死亡率极高。
    北冥与无尽海: 冰属性妖兽、海兽和深海巨影为主，许多无法拖上岸，也无法确认是否已死。

  猎杀规则:
    - 妖丹、兽皮、兽骨、毒液皆可换钱，但采集过程危险；重伤妖兽常会装死。
    - 妖兽通常不可谈判。高阶妖兽若开口说人语，反而说明它已经学会诱骗。
    - 战斗中妖兽不使用丹药和法器，靠肉身、属性攻击、地形、本能与饥饿压垮猎物。
