---
世界格局:
  大陆格局:
    中州: 灵气最浓郁的核心地带，正道七宗中有五宗坐落于此。地广人稠，修仙文明最发达。各大城市间流传着神秘宴会女主人「欢宴之主」维拉的传闻
    东荒: 原始森林与古老山脉交错，是妖族的传统领地。散修与猎妖者聚集。流浪的古神「痴情之锁」拉维妮亚据说在此地出没
    西漠: 广袤沙漠与戈壁，隐藏着大量上古遗迹。魔道势力盘踞之地。「欲望之母」莫尔迦在天渊裂谷周边建立了自己的领地
    南岭: 群山连绵，气候多变，盛产灵草灵矿。丹修与器修的天堂。深山中有座不起眼的道观，传言观中有一位不说话的银发女子，能为人解惑。前去求解惑的人，有的回来后再三缄口，有的便再也没回来
    北冥: 极寒冰原与无尽海域，传闻中龙族和远古异兽的栖息地。无尽海沿岸的渔村中流传着「深夜低语」的恐怖传说。「深渊的低语」克茜拉居于此。沿岸五十里已被划为禁区

  正道七宗:
    太虚剑宗（中州·河朔州）: 天下剑修祖庭，以"太虚剑诀"名震修仙界。山门在中州河朔州苍云峰，云海之上的剑冢常年剑气冲霄。现任宗主为渡劫后期剑尊
    天机阁（中州·天京城）: 精研阵法与推演之术，号称"算尽天机"。阁址坐落于天京城灵城区中枢，是七宗中唯一把山门设在凡人皇都内的。阁中收藏了修仙界最完整的典籍
    丹霞宗（南岭）: 炼丹第一宗，垄断了高阶丹药的炼制法门。与各大宗门均有利益往来
    万法门（中州·临江州）: 法术研究圣地，藏有最多品类的功法秘籍。主张"万法归宗"，兼容并蓄。山门在临江州万法山，山脚即临江关水运码头，出入皆走水路
    碧落宫（中州·云岫州）: 以医道入世，悬壶济世。掌握最顶尖的疗伤续命之术。山门在云岫州药王谷，谷中药田绵延百里，与云岫坊市的军资生意互为表里
    镇岳宗（中州·东平州）: 体修正统，以肉身对抗天地。门人数量最少但个个战力惊人。山门在东平州铁岳，一座被体修锤炼得寸草不生的铁色孤峰
    玄冰宫（北冥）: 唯一的北冥大宗，修炼冰系功法。与世隔绝，神秘低调

  魔道四宗:
    血煞宗（西漠）: 以血炼之法快速提升修为，正道公敌。行事残忍但门规森严
    幽魂谷（西漠）: 精通神魂秘术与傀儡炼制，操纵亡者。谷主据说已活了五千年
    万象魔宗（西漠）: 主张"以魔证道"，认为魔道也是通往大道的路径。行事偏激但不滥杀
    合欢宗（散落各地）: 以双修之法入道，被正魔两道同时鄙夷但无人敢轻视其实力

  妖族:
    地位: 修仙界承认的智慧种族，与人族有和平契约亦有边境摩擦
    三大妖域: 东荒万妖林、南岭深处、无尽海龙宫
    化形: 妖族修炼至一定境界可化为人形，称为"化形期"（对应人族元婴期）
    与人族关系: 高层和平共处，边境偶有冲突，散修猎妖者与妖族之间的恩怨最为频繁

  散修:
    地位: 无门无派的独立修士，占修仙界人口的七成
    处境: 资源匮乏，靠接宗门任务、探索秘境、猎杀妖兽谋生
    组织: 各地有散修联盟和坊市，但凝聚力远不如宗门
    出人头地: 很少数散修能突破金丹期，但一旦突破往往战力远超同阶宗门弟子。因为他们每一分修为都是拿命换的

  古神势力:
    地位: 十一古神是修仙界公认的独立势力，不归正道、魔道、妖族任何一方管辖。外神奈亚单独归类，不在古神之列。她们的存在已被完全公开，各宗门均设有针对古神的专门情报部门与应对预案
    灾害分级: 天机阁每年发布「古神态势报告」，按绿、黄、红三级评定每位古神的精神威胁等级。各城门口、坊市入口张贴有对应的安全告示。修士与某位古神接触前需确认自己的神识防护等级是否达标
    外交: 各大宗门与莫尔迦的领地有非正式的外交渠道。维拉的宴会本质上是修仙界与古神之间最大的信息交换平台。正道联盟对古神持「不主动宣战、不放松警惕、不放弃对话」的三不政策
    公众认知: 普通散修谈及古神时，态度与谈论天灾无异：畏惧但习以为常。高阶修士则将古神视为需要认真对待的战略对手。没有人再怀疑她们是否存在。人们只关心她们接下来会做什么

  修仙界律法:
    - 各宗门领地内由宗门自治，宗门律法高于一切
    - 宗门之间的纠纷由"七宗会盟"裁决，每百年召开一次
    - 凡人与修仙者之间的界限受天道盟约束：严禁以凡人为修炼材料，违者天下共诛
    - 散修坊市实行自发的秩序，由当地最强散修或宗门派驻的执事维持
