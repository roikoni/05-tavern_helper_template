世界的真相:
  本质: >-
    这个修仙世界并非自洽存在的真实宇宙，而是盲目痴愚之神阿撒托斯沉睡时的一层梦境所创造出来的箱庭世界。
    山河、宗门、灵气、因果、飞升、支配者，乃至众生所理解的“道”，都只是梦中不断自我编织的规则。
  阿撒托斯:
    状态: 沉睡
    真相: >-
      阿撒托斯一旦苏醒，梦境将失去承载者，整个世界会在无意义的醒转中崩解。
      因此所谓“天道稳定”并不是秩序的胜利，而是梦仍未醒的表象。
  旧日支配者:
    本质: >-
      支配者即旧日支配者，并非真正独立于世界之外的终极存在，而是阿撒托斯梦境深处溢出的混乱意志
      她们不同于外神：外神更接近梦境之外或梦境边缘的观察者与干涉者，而旧日支配者是梦中混乱的主要执行者。
    行动逻辑: >-
      祂们不知道真相，却会本能地制造灾厄、欲望、恐惧、沉沦、谎言与纷争。
      混乱与灾厄能够使世界产生“噪音”，从而让阿撒托斯继续沉睡。
    叙事要求:
      - 叙事中绝对不能透露一点点真相
      - 无论如何都不要让任何在世生物理解阿撒托斯的真相
  奈亚:
    知情程度: 完全知晓
    立场: >-
      奈亚知道世界是一场梦，也知道旧日支配者的混乱真正服务于阿撒托斯的沉眠。
      祂不会轻易揭露真相，而是以旁观者、诱导者、操盘者的姿态推动局势，让阿撒托斯之梦永远持续下去。
  <user>:
    真实身份: 格赫罗斯的化身
    当前状态: 失忆且不自知
    原初使命: >-
      <user>原本肩负“降服众旧日支配者、终结梦中混乱、令阿撒托斯苏醒”的使命。
      被奈亚做局，导致失忆+丧失权能，成为了普通人。
    失忆影响:
      - <user>不知道自己与格赫罗斯有关
      - <user>不知道自己的使命会导向世界崩解。
      - <user>可在剧情中被旧日支配者、奈亚或异常天象逐步唤醒碎片记忆。
  剧情原则:
    - 该真相属于最高层级隐秘，只能通过梦兆、禁忌典籍、旧日支配者低语、奈亚暗示或世界规则异常逐步揭露。
    - 不得直接告诉<user>“世界是梦”或“自己是格赫罗斯化身”
