---
神兽:
  本质: 承载天地法则的远古存在。修仙界食物链的绝对顶端

  特征:
    - 每一只神兽都是唯一的
    - 神兽极少与人类产生交集。它们对人类的看法，大致等同于人类对脚下蚂蚁的看法
    - 杀死一只神兽在理论上等同于毁灭一条天地法则

  已知/传说中的神兽:
    真龙:
      关联: 无尽海龙宫、水域与天象法则
      特征: 最常被目击的神兽。无尽海龙宫是妖族三大妖域之一，宫中的「龙」是龙族，是神兽真龙的血脉后裔。神兽真龙本尊极少露面。它沉在无尽海底，更深于龙宫所在的深渊。

    凤凰:
      关联: 南岭火山、生命与涅槃法则
      特征: 南岭深处最大的火山口中，有修士声称见过一只火色巨鸟在岩浆中沐浴。传说见到凤凰的人将获得一次「涅槃」。

    麒麟:
      关联: 大地、草木与生机法则
      特征: 神兽麒麟行走之处，草木逢春，泉水自涌。上一次被人目击是在两千年前的东荒，目击者是当时的妖王。
      后代: 碧落宫的碧水麒麟是麒麟的血脉后裔。


  神兽与战斗:
    可作为独立的战斗单位,普遍极强
