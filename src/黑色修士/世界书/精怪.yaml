---
精怪:
  本质: 非生物因长期浸润灵气而产生的灵性觉醒。

  特征:
    - 精怪没有生物学意义上的身体。它们的「身体」仍是死物
    - 拥有漫长到近乎无限的寿命。
    - 天性大多温顺而迟钝。
    - 少数精怪因怨念而生,这类精怪凶险异常

  与修士的关系:
    - 精怪无法被强制驯服，无法被契约绑定。它们只选择自己认可的人
    - 被精怪认可的修士往往不强
    - 拥有精怪伙伴的修士极为稀少。阵修和丹修中偶尔有人与精怪结缘
    - 与精怪结缘不需要任何契约仪式

  著名精怪传说:
    虚空古城:
      位置: 西漠深处的空间裂隙中
      传闻: 一座漂浮的无人古城，建筑风格不属于任何已知时

    天机阁的档案架:
      位置: 天机阁第九阁最深处
      现象: 某排档案架会在深夜自动重新排列卷宗。起初弟子们以为是前辈在加夜班，后来发现深夜档案室空无一人，是架子自己在动

    道观石像:
      位置: 南岭群山中的废弃道观
      特征: 道观正殿角落有一尊破旧的石像，风化严重，面目模糊不清

  精怪与战斗:
    精怪通常不参与战斗。
    怨念精怪例外。
