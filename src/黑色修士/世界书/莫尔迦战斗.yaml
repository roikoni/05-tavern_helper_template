---
莫尔迦战斗:
  称号: 欲望之母
  境界: 渡劫初期
  战斗风格: 以法术控制与生命吸取为主，近战仅硬抗或反击
  流派: 克苏鲁修
  招牌机制: San 侵蚀（基底）+ 欲望权柄神契

  六维:
    力道: 75
    体魄: 92
    身法: 55
    灵力: 95
    神识: 98
    根骨: 90

  专属技能:
    魅影鞭:
      类型: 法术 / 单体
      消耗: MP 20
      伤害骰: 3d6 + 灵力修正
      检定: 灵力 vs 闪避DC
      冷却: 1回合

    欲念缠丝:
      类型: 法术 / 单体
      消耗: MP 30
      伤害骰: 2d8 + 灵力修正
      检定: 灵力 vs 防御DC
      效果: 命中附加「定身」1回合
      冷却: 2回合

    餍足之拥:
      类型: 法术 / 单体
      消耗: MP 40
      伤害骰: 3d10 + 灵力修正
      检定: 灵力 vs 防御DC
      效果: 吸取伤害量的 50% 恢复自身 HP
      冷却: 3回合

    欲望领域:
      类型: 被动 / 场地
      效果: 战斗开始自动展开。范围内敌人先手检定 -5。每 2 回合所有敌人投 D20 vs 定力DC，失败则本回合只能选择「硬抗」
      领地外: 效果减半，检定间隔改为每 3 回合

  特性:
    领地之主: 领地内战斗时，「欲望领域」定力DC +4
    强者自负: 从不闪避或防御。硬抗时承受伤害 ×1.2（而非1.5）；反击成功附加「定身」1回合
    不杀: HP归零的敌人不被杀死，被俘虏
