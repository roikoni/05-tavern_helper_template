---
writingstyle_request:
  style_summary:
    reference:
      work: [通俗古风修仙小说]
    overall_impression: 采用通俗古风第二人称（"你"）进行叙事。语言在古典白话与现代网文之间取得平衡——既有"之乎者也"等文言虚词点缀以营造古意，又保持了网文流畅直白的可读性。叙述语调冷静克制，以旁观者姿态呈现世界的运转与角色的抉择，侧重客观描写外在环境、动作与事件进程，内心活动简洁内敛、不泛滥。整体节奏张弛有度，在战斗、突破等高潮段落加速，在日常游历、修炼中放缓，营造出修仙世界的宏大与个体修行的孤寂感
    key_characteristics:
      - '**通俗古风语言**: 以白话为主体，间杂"之""者""也""其""此""乃""便""皆"等文言虚词及四字成语，形成古朴但不晦涩的语言质感'
      - '**第二人称叙事**: 全程使用"你"作为叙述对象，带领读者代入角色视角体验世界，但叙述语气保持客观冷静，不做过度共情'
      - '**弱化内心独白，强化外在描写**: 内心活动精简克制，多为简短的反应与判断；大量笔墨倾注于环境、动作、物品、功法、境界等外在世界的细致刻画'
      - '**系统化世界观呈现**: 对修炼体系、功法等级、灵药法宝、宗门势力等设定进行清晰条理的叙述，善用分类、对比、递进等手法'
      - '**冷静克制的叙述语调**: 即便是生死关头、惊心动魄的战斗，叙述也保持一定距离感，不煽情，以事实和细节推动读者情绪'
      - '**节奏层次分明**: 日常修炼/游历以舒缓的长句铺陈；战斗/危机时刻以短句快节奏推进，形成节奏反差'
      - '**修炼生存主义基调**: 叙事中自然流露出修仙界弱肉强食、步步谨慎的生存法则，角色行事重利弊权衡而非热血冲动'
  dimensions:
    vocabulary:
      richness: 中高 (白话词汇为主，适度融入古典词汇与成语，兼具修仙术语体系)
      complexity: 中 (避免生僻古字，以网文读者可流畅阅读为准；修仙术语自成体系但不故作高深)
      formality: 半正式 (白话基底上提升至略带书卷气的叙事语气，但对话部分根据角色身份灵活变化)
      domain_specificity: 高 (大量使用修仙/玄幻领域的专有术语体系：境界名称、功法分类、丹药等级、阵法符箓、灵兽品阶等)
      emotional_valence: 偏冷/克制 (叙述者情绪表达克制，以客观描述为主；即使涉及喜怒哀乐，也以简短有力的方式呈现，不做滥情渲染)
      abstract_concrete_ratio: 偏具体 (以具体可感的场景、动作、物品、环境描写为主，抽象感悟与心境变化点到即止)
      common_word_categories: 频繁使用修炼术语（境界、突破、灵气、神识、丹田、元婴等）、动作描写词汇（身形、施展、催动、凝聚、祭出等）、数量与程度描述（些许、一股、数丈、片刻、良久等）、方位与空间词汇（前方、周身、天际、洞府、秘境等）
      notable_word_choices: 偏爱简洁有力的动词和量词；使用文言虚词（之、者、也、其、此、乃、便）点缀增强古朴感；善用四字词组简洁概括（如"波澜不惊""不动声色""心念一动"）；避免现代口语词汇和网络流行语
    sentence_structure:
      avg_sentence_length: 中等偏长 (描写与叙述句较长以承载细节，动作与对话句简短有力)
      length_variation: 高 (长句铺陈环境与设定，短句推进动作与对话，长短交错形成节奏)
      complexity_level: 中等 (多用并列、承接关系的复句；较少使用层层嵌套的复杂从句)
      primary_sentence_types: 陈述句绝对主导；偶尔以反问句表现角色内心质疑；感慨句极少使用
      use_of_clauses: 多用并列分句和连贯动作描写；定语从句简洁（多为单层修饰）；状语从句常用于交代时间、条件（"当……时""若是……""待……之后"）
      sentence_openings: 常见以时间状语（"片刻后""半日后""数日转眼即逝"）、方位短语（"洞府之内""前方不远处"）、动作主语（"你催动……""你目光扫过……"）或直接动作开篇
      notable_syntactic_patterns: 动作连缀句式常见（"你身形一闪，便已出现在……"）；条件/因果逻辑链明确（"既然……便……""若是……那便……"）；使用文言固定搭配（"……之所在""……之处""……之时"）替代纯白话表达
    tone_and_mood:
      overall_tone: 冷静克制、客观从容，略带沧桑苍凉底色；叙述者在宏大世界面前保持谦逊与谨慎
      formality_level: 半正式 (叙事部分偏书面，对话部分随角色身份从文言到白话灵活变化)
      subjectivity_objectivity: 偏客观 (以外部世界描述和事件推进为主导，内心活动精简克制)
      emotional_expression: 间接为主 (通过动作、环境、细节暗示情绪，而非直接大段独白；偶尔以简短内心判断直接表达)
      target_audience_attitude: 平等尊重，既不俯视说教也不刻意讨好；将读者视为同道中人，共同窥探修仙世界的奥秘
      mood_consistency: 整体冷静稳健，但在战斗/危机中会自然而然地加速和收紧，在日常/游历中恢复从容
      dominant_emotions: 谨慎、冷静、坚毅占据主导；好奇、期待偶尔浮现；焦虑和恐惧被克制在行动之下；喜悦和满足极为克制
    pacing_and_flow:
      overall_pacing: 中速为主，张弛有度 (日常修炼与游历偏慢铺陈，战斗与危机加速推进)
      pacing_variation: 明显 (长段描写与设定介绍时放缓；短促对话与连续动作时加快；章节末尾常以悬念或进展提速)
      sentence_length_for_pacing: 短句加速（"你不再犹豫。"），长句减速（环境描写、设定讲解）
      use_of_transitions: 以时间推移和空间转移为自然过渡；段落间常用时间状语（"数日后""与此同时""转眼间"）或空间切换做衔接
      information_density: 中高 (在描写和叙述中承载较丰富的世界信息与设定细节，但对话和信息揭示有节制)
      narrative_flow: 线性推进为主，偶尔以简短回忆或解说补充背景；不使用复杂的非线性叙事
      white_space_usage: 适当分段，按场景转换、时间推移、话题切换自然分节；对话以独立段落呈现
    figurative_language:
      frequency: 中低 (自然融入，不刻意堆砌修辞)
      dominant_techniques: 多用简洁明喻（以自然物类比——"如潮水般涌来""如惊雷炸响"）；适当拟人（赋予自然现象灵性）；数据化/等级化描述本身就是一种修辞特色
      complexity_of_figures: 简单直白，以增强画面感和力量对比为目的，避免华丽矫饰
      purpose_of_usage: 让抽象的力量体系变得可感（"灵气浓郁如实质"）；渲染战斗的震撼与境界的差距；塑造修炼世界特有的美感
      consistency_in_usage: 契合世界观设定，修辞取材于修炼者熟悉的自然与战斗意象
      notable_examples: 力量比喻多用自然现象（山岳、潮水、雷暴、风暴）；速度以具体动作呈现（"你脚未动，剑已至胸前"）；境界差距以"天地之别""萤火与皓月"等比照
    point_of_view:
      person: 第二人称 ("你")
      perspective_scope: 严格限制在"你"的感知范围内，不跳转到其他角色的内心世界
      focalization: 外聚焦为主、内聚焦为辅 (以"你"的所见所闻所感为限，但更侧重外在观察而非内心剖析)
      narrative_distance: 中等 (叙述者始终伴随"你"但不完全沉入"你"的每缕思绪；在关键抉择和反应时拉近，在日常行动中稍微拉远)
      reliability: 高度可靠 (叙述者客观呈现世界，不故意误导或隐瞒；角色自身的判断可能有误，但叙述本身不歪曲事实)
      consistency: 高度一致
    dialogue_style:
      naturalism_level: 因角色身份而异 (凡人角色口语化，修仙者语言偏文雅简练，高阶修士可带文言色彩)
      directness: 对话直接实用，少有无意义的寒暄；修仙者对话常含机锋、试探与保留
      dialogue_tags: 简洁 ("你说""他道""某人淡淡道""某人冷哼一声")，常以动作或神态替换提示语
      character_differentiation: 通过语气、称呼、对修炼术语的使用程度区分角色层次与性格
      length_and_pacing: 对话简短精炼，以传递信息、推进剧情为要；避免长篇独白和哲学讨论
      function_of_dialogue: 传递情报与线索，展现势力关系与人物立场，推动交易/战斗/联盟等核心行动
      inclusion_of_action: 对话中频繁插入动作、表情、环境互动与灵力气场变化
    paragraph_structure:
      avg_paragraph_length: 中长 (描写和叙述段落较长，对话段落短)
      length_variation: 高 (大段世界观描写可达十余句，动作段落可能仅一两句即成段)
      topic_sentence_usage: 不强调固定主题句；段落围绕一个场景、一个事件阶段或一个设定要点自然展开
      internal_cohesion: 强
      transition_between_paragraphs: 常以时空推移（"片刻后""与此同时""在……的另一端"）或逻辑递进（"不仅如此""更重要的是""然而"）自然过渡
      paragraph_function: 描写（环境/物品/人物外貌）与叙事（事件推进）并重；描写承载世界观信息，叙事推进情节
    sensory_detail:
      overall_frequency: 中高 (是营造沉浸感的重要手段)
      dominant_senses: 视觉最为突出（环境外貌、战斗场面、宝物灵光）；体感/灵气感知次之（灵力波动、威压、神识探查）；听觉再次（风声、雷鸣、低语）；嗅觉味觉偶有涉及
      vividness: 追求准确具体的画面感，让玄幻世界"落地"——如对洞府布局、法器形制、丹药色泽气味的精确描述
      integration_with_narrative: 感官细节完全融入叙事，是触发角色判断和行动的直接依据（你感受到灵气波动→你警惕→你探查→你发现）
      specificity: 具体精确，避免模糊笼统；色泽、形状、温度、强度等均有明确描写
      function_of_details: 营造修仙世界真实感；提示危险与机遇；刻画功法与环境交互；增强读者代入感
    structural_elements:
      use_of_headings: 不使用
      chapter_division: (不限)
      use_of_lists: 在介绍体系（如境界划分、功法层级）时可使用条理化的列举，但不使用现代编号格式，而用"其一……其二……"或自然递进
      typography_emphasis: 不使用特殊排版或强调符号
      non_standard_layout: 可包含简短回忆/解说段落作为背景补充，通常以"原来……""说起来……"自然引入
      narrative_framing: 以修仙世界的当下时间线为主线，不做框架嵌套
    specific_quirks:
      repetitive_phrases: 可能出现体现修炼者习惯的固定表达（如"你停步""你抬眼""你收剑入鞘"）作为叙事节奏的锚点。避免"心念一动""不动声色"等抽象内心动词反复出现
      unique_punctuation: 不使用特殊标点；省略号可用于表现沉吟或意犹未尽（谨慎使用）
      grammatical_deviations: 基本遵循现代汉语语法；适度使用文言省略（宾语省略、"之"字结构的主谓之间加"之"取消句子独立性）但不影响理解
      rhetorical_preferences: 以力量对比和境界差距为核心的比较描写；以系统化、层级化呈现修炼体系为显著特色；冷静克制的叙述本身就是一种风格态度
      unusual_formatting: 无特殊格式要求
      other_observations: 核心在于用冷静客观的通俗古风语言，以第二人称带领读者穿行于一个真实可感的修仙世界。叙述者如同一位沉默的画师，只负责精准地描绘世界、动作与选择，而将内心的共鸣留给读者自行体味。这种"留白"式的克制叙事，正是《凡人修仙传》等经典修仙网文的内在魅力所在
