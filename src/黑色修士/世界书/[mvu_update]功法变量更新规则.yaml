---
功法变量更新规则:
  功法:
    说明: 仅装根据本源与流派生成的基础功法树，由功法树界面「生成功法」按钮触发脚本静默生成
    check:
      - AI 不得 insert/replace/delete 此变量；剧情中外来习得的功法一律 insert 到 /初始功法/
      - 已学习状态由前端"参悟"按钮控制
  初始功法:
    type: |-
      {
        [功法名: string]: {
          类型: '主动' | '被动';
          层级: number;          // 1=黄阶下品 2=黄阶中品 3=黄阶上品 4=玄阶下品
                                 // 5=玄阶中品 6=玄阶上品 7=地阶下品 8=地阶中品
          前置功法: string;      // 与功法树分离，固定为空字符串
          效果: string;          // 15-30 字简明效果描述
          属性加成: string;      // 被动功法对六维的具体加成，如"力道+5，身法+3"；主动功法若不含被动加成则留空
          已学习: boolean;       // 主角已掌握并可使用为 true；仅得残卷未参悟为 false
          消耗灵悟: number;      // 与功法树分离，固定为 0
          描述: string;          // 功法背景或额外说明，可为空
        }
      }
    check:
      - 装载所有"不在功法树中的已掌握功法"：开场捏角选定的功法 + 剧情中拾得/被传授/自悟习得的外来功法
      - 主角在剧情中得到功法残卷、被传授、拾得功法、自悟新功法时 insert 单条新条目（写入 /初始功法/，不写入 /功法/）
      - 前置功法固定为 ""、消耗灵悟固定为 0；不参与功法树布局
      - 已学习：剧情中明确传授并立刻教会时为 true；仅得残卷未参悟时为 false
      - 不要重复 insert 已存在功法，修改具体字段使用 replace
      - 层级按功法本身的修仙体系合理给出（仅作展示，与树的前置链无关）
      - 被动功法应在 属性加成 字段明确标注六维加成（如"力道+5，身法+3"），主动功法若无被动加成则 属性加成 留空
      - 命名风格遵循流派古韵（剑修：剑诀/剑式/剑意；法修：御灵诀/真火经；体修：锻体经/不坏金身；丹修：丹方/丹经；阵修：阵图/阵心；符修：符诀/符箓；魂修：神识诀/炼魂经；魔修：血炼法/魔功；克苏鲁修：禁忌认知/深渊凝视）
      - 功法名以四字为主，偶尔三字或五字；不可与已有功法重名（含 /功法/ 与 /初始功法/）
    insert 示例:
      - '{ "op": "insert", "path": "/初始功法/太虚基础剑式", "value": { "类型": "主动", "层级": 1, "前置功法": "", "效果": "标准剑式三招，造成法力×1.0伤害", "属性加成": "", "已学习": true, "消耗灵悟": 0, "描述": "" } }'
      - '{ "op": "insert", "path": "/初始功法/玄甲铁身经残卷", "value": { "类型": "被动", "层级": 2, "前置功法": "", "效果": "气血上限+20%，受伤减免10%", "属性加成": "体魄+3，力道+2", "已学习": false, "消耗灵悟": 0, "描述": "残卷不全，需在剧情中参悟方能掌握。注：气血上限已由体魄派生，此处加成已折算为体魄" } }'
