---
BOSS概览:
  雾蛰:
    身份: 沉雾地龙，万妖林深处枯雾渊蛰伏的妖族地龙
    境界: 元婴后期
    所处位置: 东荒·万妖林深处枯雾渊（地脉节点）
    出现可能: 误入枯雾渊者，或觊觎「裂岳」兵器的寻宝修士
  百变坚果:
    身份: 千面之壳，奈亚以低语点化的坚果成精，藏于百草园药田
    境界: 金丹后期
    所处位置: 南岭·百草城百草园药田
    出现可能: 触及其守护之物者，或识破其拟态本相者
  曐麖-万:
    身份: 银鳞苍主，北海渔港外海银龙渊沉睡的两千米巨型银龙
    境界: 合体后期
    所处位置: 北冥·北海渔港外海银龙渊
    出现可能: 深入银龙渊者，或触怒其龙威者
