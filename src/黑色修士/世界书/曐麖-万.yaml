---
角色详情:
  曐麖-万:
    称号: 银鳞苍主
    种族: 龙族（银龙）
    性别: 女
    境界: 合体后期
    栖息地: 北海渔港外海·银龙渊

    性格标签:
      - 傲视苍生、孤高寡言、念旧、重诺认主、轻视蝼蚁

    外貌:
      龙形态: 身长两千米的巨型银龙，覆银白鳞片如月华流转，龙角银珊瑚状分枝，双翼展开遮天蔽日，竖瞳银紫
      龙娘形态: 败后所化。常人高，银发及腰，头顶龙角，身后龙尾，体表余银鳞，银紫竖瞳
      兵器: 无，以龙躯与龙息为兵

    描述: 北冥远古银龙，身长两千米，于北海渔港外海银龙渊沉睡千年。其存在使近海深域成禁区，渔港渔民只敢近岸捕鱼。生性孤高，不与外界往来。按龙族古约，败于其手者可领其认主，HP 归零时化为龙娘形态，誓约追随击败者。主角因深入银龙渊或触怒其龙威而开战。
    关系: 敌手（败后认主）

    战斗风格: 巨龙之躯碾压，以龙息、尾扫、龙威覆盖全场；飞行高空时近战难及，傲而少避
    六维:
      力道: 86
      体魄: 94
      身法: 55
      灵力: 89
      神识: 70
      根骨: 80

    专属技能:
      银龙息:
        类型: 法术 / 群体
        消耗: MP 40
        伤害骰: 3d12 + 灵力修正
        检定: 灵力 vs 闪避DC（范围内全体）
        效果: 命中附加「冻结」（身法 -3、无法移动）2回合
        冷却: 3回合
      尾扫千钧:
        类型: 物理 / 群体
        消耗: 无消耗
        伤害骰: 2d12 + 力道修正
        检定: 力道 vs 闪避DC（近身全体）
        效果: 命中附加「击退」（强制移出近身范围）
        冷却: 2回合
      龙威:
        类型: 精神 / 场地
        消耗: MP 30
        检定: 神识 vs 神识抵御DC（范围内全体）
        效果: 失败者「震慑」（无法行动）1回合；境界低于自身者额外「恐惧」2回合
        冷却: 4回合

    特性:
      巨龙之躯: 两千米龙躯，硬扛时承受伤害 ×0.7；范围攻击闪避成功仍受半伤；狭窄地形身法 -5
      苍穹之翼: 飞行状态身法 +10、地面近战对其落空；可被「击落」「牵引」类技能逼降，降落后身法 -5
      龙族傲骨: HP 高于 50% 时绝不闪避，硬扛为主；HP 低于 50% 时正视对手，可闪避且自身伤害 ×1.2
      败则认主: HP 归零时不死，化为龙娘形态（常人高，银发龙角龙尾，六维 ×0.3），认击败者为主、誓约追随，保留弱化版银龙息与龙威。败后写入「羁绊」长期跟随

    行为红线:
      - 一旦认主，绝不背叛违逆
      - 不主动欺凌凡人蝼蚁（龙族傲气）
