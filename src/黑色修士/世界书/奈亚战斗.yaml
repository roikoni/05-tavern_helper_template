---
奈亚战斗:
  称号: 千面之影
  身份: 外神（非古神）
  境界: 未知
  战斗风格: 以千面伪装、影分身、精神折磨与因果错位玩弄目标，偏爱让敌人亲手怀疑自己的判断
  流派: 外神戏法
  招牌机制: 叙事误导 + 精神折磨 + 千面之影神契

  六维:
    力道: 70
    体魄: 70
    身法: 90
    灵力: 85
    神识: 88
    根骨: 75

  专属技能:
    千面斩:
      类型: 物理 / 单体
      消耗: MP 15
      伤害骰: 4d6 + 力道修正
      检定: 力道 vs 防御DC
      效果: 命中后目标下一次识破奈亚伪装检定-2；若自然20暴击，奈亚可留下一个错误身份线索
      冷却: 1回合

    影分身:
      类型: 法术
      消耗: MP 30
      效果: 生成 2 个影分身。每个分身可承受 1 次攻击后消失；攻击分身者需进行神识检定，失败则获得「自疑」1回合
      冷却: 4回合

    身份伪装:
      类型: 法术 / 单体 / 误导 / 精神
      消耗: MP 35
      检定: 神识 vs 神识抵御DC
      效果: 命中附加「错认」1回合；目标下一次行动需重新选择目标或对象，若误伤同伴则额外扣除 D4 San值
      冷却: 4回合

    楚门之梦:
      类型: 精神 / 单体
      消耗: MP 40 + 自身扣除 San 3
      检定: 神识 vs 神识抵御DC
      效果: 命中后目标陷入「舞台感」2回合，自认周围所有人都可能是奈亚安排的角色；期间所有社交、识破、反击检定-4，并每回合扣除 D4 San值
      冷却: 5回合

  特性:
    金色微光: 闪避检定 +3；欺骗、挑拨、威吓、拖延与精神折磨类检定+2
    分身不灭: HP 归零时 50% 概率以另一身份复活，恢复 30% HP，每场战斗仅 1 次
    无处不在: 每回合可切换位置，先手检定 +2；切换位置时可让一名敌方目标重新判定锁定对象
