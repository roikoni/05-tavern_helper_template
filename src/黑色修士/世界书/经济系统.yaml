---
经济系统:
  通用货币:
    灵石:
      本质: 天地灵气在地脉深处经过万年以上的高压凝结而成的矿石。既是修炼资源，也是通用货币
      外观: 灵石呈半透明的晶状体，内部有可流动的灵光。品级越高，灵光越浓郁、色泽越纯粹
      流通原理: 灵石之所以成为货币，是因为所有修士都需要它：它既是「钱」也是「粮食」。一个修士在灵气稀薄之地修炼时，可以直接吸收灵石中的灵气来维持修炼速度

    兑换率:
      极品灵石: 1枚 = 100枚上品灵石 = 10,000枚中品灵石 = 1,000,000枚下品灵石
      上品灵石: 1枚 = 100枚中品灵石 = 10,000枚下品灵石
      中品灵石: 1枚 = 100枚下品灵石
      下品灵石: 基础单位

      实际流通: 日常交易以下品和中品灵石为主。上品灵石多见于大宗交易（法器买卖、秘境入场费）。极品灵石极为稀有，通常只在宗门级交易或拍卖会上出现，普通修士终其一生可能都未见过

    凡人货币:
      金银铜: 凡人世界使用金银铜币，与灵石的兑换率因地区而异
      大致汇率: 1枚下品灵石 ≈ 10两黄金 ≈ 100两白银（凡人货币对修士而言毫无价值，因此汇率波动极大，全看当地是否有修士愿意收金银）
      实际场景: 散修在偏远山村住店，一枚下品灵石足以让店主全家伺候一个月。但坊市内无人收金银：在修士聚集地，凡人货币等同废纸

  修士收入参考:
    散修:
      炼气期: 月收入 10-30 下品灵石（接宗门外派任务、猎杀低阶妖兽、采药）
      筑基期: 月收入 50-150 下品灵石（探索秘境外围、炼丹制符出售、狩猎中阶妖兽）
      金丹期: 月收入 5-30 中品灵石（秘境深入探索、高阶丹药炼制、接受宗门委托）
      元婴期以上: 收入波动极大，以中品乃至上品灵石计

    宗门弟子:
      炼气期外门: 月俸 15-30 下品灵石 + 基础丹药配额
      筑基期内门: 月俸 50-150 下品灵石 + 丹药配额 + 法器使用权限
      金丹期核心: 月俸 10-50 中品灵石 + 高阶丹药 + 修炼洞府
      元婴期长老: 月俸 50-200 中品灵石 + 大量资源配额 + 领地税收分成

    丹修/器修（有手艺者）:
      收入远高于同阶战斗修士。一位筑基期的炼丹师，月收入可以达到金丹期散修的水准

  区域经济差异:
    中州: 灵气最浓郁，灵石矿脉最丰富，物价最高。一枚中品灵石在中州的购买力，可能只相当于南岭的七成
    东荒: 妖族领地，灵石流通量少。部分妖族部落不使用灵石，以兽骨/妖丹作为交易媒介
    西漠: 魔道势力盘踞，虽有灵石矿脉但开采混乱。物价波动极大
    南岭: 灵草灵矿产地，原材料便宜但成品（丹药/法器）贵。丹修和器修的天堂，散修攒钱的地方
    北冥: 资源匮乏，修士稀少。灵石在这里的购买力最高

    古神经济: 古神不参与灵石流通：她们不需要灵石修炼。但部分古神的领地内有自己的人间经济体系。莫尔迦的绿洲有自己的税收和贸易；维拉每到一个城市会花大量灵石办宴会，灵石来源不明
