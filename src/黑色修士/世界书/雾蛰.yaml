---
角色详情:
  雾蛰:
    称号: 沉雾地龙
    种族: 妖族（地龙）
    性别: 男
    境界: 元婴后期
    栖息地: 万妖林深处·枯雾渊

    性格标签:
      - 沉稳如岳、护脉至极、慢条斯理、轻视飞禽族类、念旧不嗜杀

    外貌:
      人形态: 高大壮硕男子，肤色赭黄，瞳如黄玉，沿脊柱隐现暗褐鳞片，周身常笼淡雾
      兽形态: 体长数十丈的无翼地龙，覆赭褐厚鳞，四足粗壮如石柱，颈鬃如石笋丛生，鼻息吐出即成雾
      兵器: 「裂岳」重戟，戟身石质通体赭褐，刃口隐现龙纹，重逾千斤

    描述: 古地脉孕育的地龙，修成人形后以妖丹真灵铸成本命兵器「裂岳」，于万妖林深处枯雾渊地脉节点沉蛰千年。林中妖族知其所在，绕行不扰。本命真灵寄于兵器，肉身不过是真灵显化的躯壳。

    战斗风格: 人形态持重戟正面压制，兽形态以体魄与地脉术横扫；偏好硬碰，少诈术，常以雾遮蔽伺机
    六维:
      力道: 70
      体魄: 80
      身法: 35
      灵力: 48
      神识: 42
      根骨: 68

    专属技能:
      裂岳·崩山斩:
        类型: 物理 / 单体
        消耗: 无消耗
        伤害骰: 2d12 + 力道修正
        检定: 力道 vs 防御DC
        效果: 命中附加「震慑」（下次行动检定 -2）1回合
        冷却: 2回合
      地脉·枯渊震:
        类型: 法术 / 群体
        消耗: MP 30
        伤害骰: 2d10 + 灵力修正
        检定: 灵力 vs 闪避DC（范围内全体）
        效果: 命中附加「减速」1回合；地面碎裂，范围内身法检定 -2 持续本场
        冷却: 3回合
      雾·沉渊:
        类型: 法术 / 场地
        消耗: MP 25
        检定: 神识 vs 神识抵御DC（抵抗窒息）
        效果: 展开浓雾覆盖战场3回合。雾中敌人攻击与神识检定 -2；雾蛰借雾隐蔽，身法 +2。滞留满2回合起每回合受 1d6 窒息伤害
        冷却: 4回合

    特性:
      人兽双形: 人形态持「裂岳」近战，兽形态弃兵器以爪牙与地脉术应敌；切换耗费整轮行动，切换当回合受击伤害 ×1.2
      本命兵器: 妖丹真灵寄于「裂岳」。HP 归零时肉身崩散为灵力注入兵器，兵器留存可被战胜者收取，得「裂岳」一柄，含地龙残存意志，长期执握可能反噬或孕育重生
      地脉之躯: 立足大地时根骨 +5、每回合恢复 1d6 HP；被击飞或悬空时身法 -3 且无法恢复

    行为红线:
      - 兽形态下绝不离「裂岳」过远，兵器被夺必反扑
      - 不毁伤所镇地脉节点（自身根基所系）
