---
古神:
  定位:
    - 古神是自外星深空降临此界的秩序侧高位存在，近似克苏鲁神话中 Elder Gods 的本土化映射。
    - 她们并非天道本身，也不是凡人意义上的善神；但相较旧日支配者与外神，古神更接近“秩序侧”“守护侧”“可交涉的善意侧”。
    - 古神通常不会主动统治人类，也不会以信徒洗脑、精神污染或大规模恐惧为成长方式。她们维护的是世界可继续运转的边界，而非某个宗门或王朝的利益。
    - 古神从未被天渊裂谷封印，也不存在“古神破封”一说。凡涉及古神被镇压、破封、逃出裂谷的说法，均属于旧档误记或民间传闻。

  来源:
    - 上古旧日战争期间，旧日支配者与人类爆发大规模冲突，人类修仙文明几乎被精神污染、梦境侵蚀和深海低语拖入崩溃。
    - 战争最危急时，十一位古神循星轨自外星降临。她们不是此界原生神明，而是来自深空秩序阵营的远星来客。
    - 古神降临后并未接管人类文明，而是向人类先贤传授稳定神识、锚定现实、抵御旧日低语的方法，并协助建立针对克苏鲁的封印。
    - 战后，部分古神选择留在此界观察文明演化，部分古神长期隐匿身份。修仙界对她们的理解因此混杂了敬畏、误解和政治化传闻。

  与人类的关系:
    基本态度:
      - 古神对人类总体保持克制的善意：她们不会替人类解决所有苦难，但会阻止足以摧毁文明根基的旧日灾厄。
      - 古神承认人类自由意志的价值，不会强迫凡人信奉自己，也不会把人类当作精神食粮。
      - 当人类触碰会唤醒旧日支配者、外神或阿撒托斯梦境深层裂缝的禁忌时，古神会以梦兆、神谕、化身、星象异常等方式警告或阻止。
    善的边界:
      - 古神的“善”不是温柔保姆式的善，而是维护秩序、保护种族延续、守住世界边界的宏观善。
      - 若少数人必须牺牲才能避免克苏鲁苏醒或旧日污染扩散，古神可能作出冷酷选择，但她们不会从痛苦中取乐。
      - 古神不会鼓励主角滥杀、奴役、洗脑或以混乱换取力量。

  权能:
    秩序权柄:
      - 修补空间裂隙、稳定星轨、压制旧日低语、驱散污染梦境。
      - 净化或暂时隔离精神污染，使受害者恢复自我认知。
      - 通过神谕、星象、梦兆或古老遗迹留下警告，引导修士避开不可逆的灾难。
    降临限制:
      - 古神极少以完整真身行动。她们的深空本体与凡世法则并不完全兼容，长期显现会扰动灵气、星象与因果。
      - 她们更常使用化身、眷者、梦中声音、星轨遗迹或神识回响间接行动。
      - 古神之间有古老约束：不得直接代替凡人治理世界，不得把自身意志强加为唯一秩序。

  与旧日支配者:
    对立关系:
      - 旧日支配者代表混乱、梦魇、欲望失控、精神污染与不可名状的破坏本能。
      - 古神代表秩序、星轨、边界、清醒与文明延续。
      - 两者不是同族的不同派系，而是宇宙运行中相互对抗的两类高位存在。
    旧日战争:
      - 上古时代，旧日支配者曾试图撕开现实边界，使凡世沦为梦魇与污染的牧场。
      - 人类先贤与旧日支配者长期交战，几近败亡。古神在战争后期自外星降临，成为人类反攻的关键援军。
      - 目前唯一确认被封印的旧日支配者是克苏鲁。克苏鲁被镇压于天渊裂谷深处，其梦境低语仍会沿封印裂纹渗出。
      - 其他旧日支配者并未在当前设定中被封印，也尚未正式编入人物；她们只作为未登场的深层威胁与后续扩展空间存在。

  叙事规则:
    - 写到古神时，应体现庄严、克制、秩序、远古善意和不可轻易理解的宏观视角。
    - 古神可以严厉、冷漠、代价高昂，但不应表现为以混乱取乐、主动诱导人类堕落或依靠洗脑扩张势力。
    - 若剧情需要制造精神污染、疯狂低语、欲望灾害、梦魇侵蚀、封印裂纹等事件，优先归因于克苏鲁、其他旧日支配者、外神或其残留影响，而非古神。
    - 禁止将古神写成曾被人类封印、从天渊裂谷逃脱、因幽闭封印产生创伤的存在。
    - 低阶修士可继续误称一切高位存在为“古神”，但叙事旁白和高阶情报应区分“古神”与“旧日支配者”。
