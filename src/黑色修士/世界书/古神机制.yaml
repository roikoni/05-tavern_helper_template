---
古神:
  起源:
    - 古神的确切来历无人知晓。她们自称是「比修仙更古老的存在」，在被封印之前曾有过自己的文明
    - 二百年前天渊裂谷深处的太古封印破裂，十一位古神与一位外神自封印中逃脱。被封印前的真身并非人形。但破封时力量几乎散尽，只能凝聚为最节约能量的形态：年轻女子的身体
    - 她们破封后沿用此形。修仙界推测此形态最便于她们行事
    - 破封之后十一位古神与那位外神没有联合行动，各自散入五域。二百年来互不统属，各自以公开身份活动。修仙界早已完全知晓她们的存在与来历

  社会认知:
    势力属性:
      - 修仙界将古神视为一种特殊的政治实体。她们不属正道、不属魔道、不属妖族，自成一体
      - 莫尔迦的西漠绿洲领地已被各大宗门默认为事实上的独立王国。正道七宗公开谴责，私下却与她保持贸易与情报往来
      - 古神之间没有统一的组织或同盟，但外界习惯将她们放在同一个框架下评估。天机阁每年发布的「古神态势报告」是各大宗门战略决策的核心参考
      - 任何宗门与古神发生冲突时，其他古神通常不会介入。但不介入不代表不关注。莫尔迦曾公开表态：「你打你的，我看我的。打输了别哭，打赢了别得意。」
    灾害属性:
      - 古神的精神影响能力被修仙界视为一种天灾级别的威胁。低阶修士在古神面前没有任何有效的精神防御手段。修真界对古神的精神污染等级有一套非正式但通用的分类：绿级（可安全接触）、黄级（需神识防护）、红级（禁止接近）
      - 克茜拉的精神污染被评定为红级。无尽海沿岸渔村方圆五十里已被划为禁区。误入者生还率低于千分之三
      - 拉维妮亚的精神绑定被评定为黄级偏红。与她接触超过七日即有被绑定风险。东荒各城门口贴有通报：「痴情之锁行踪不明，修士请勿与陌生女子长期同行」
      - 莫尔迦的领地被评定为黄级。进入后会产生眷恋感，但主动离开不会受阻。各大宗门每年会派遣化神期以上的修士前去「考察」，考察报告中有相当一部分提到「不想回来了」
      - 斯芬克丝被评定为绿级偏黄。她的精神暗示不会主动扩散，但前去向她求解惑的人有概率成为她的信徒
      - 维拉被评定为黄级。参加她的宴会需签署正道联盟统一印制的免责文书，确认已被告知欢宴之主的真实身份及精神影响风险
      - 奈亚的精神威胁等级被标注为「无法评定」。天机阁的评语为：「你不知道她在哪里，她可能在任何地方。这个事实本身就是威胁。」

  成长机制:
    力量恢复:
      - 古神的力量恢复依赖精神网络的规模。每一位被洗脑的信徒都会持续为其提供微量的精神力滋养。信徒越多、修为越高，古神力量恢复越快
      - 古神恢复如此之快的原因就在这里：她们并非自己修炼，只是汇聚了成百上千信徒的精神力
      - 古神自身保持清白。她们不通过肉身接触获取力量。所有控制均通过精神层面完成

  精神影响:
    暗示能力:
      - 古神能将意念直接投射进目标识海，不经过语言和感官
      - 低阶暗示：让目标产生好感与接近的冲动
      - 中阶暗示：植入特定念头或行为倾向，目标以为是自己做的决定
      - 高阶暗示：全面重塑目标的价值观与忠诚体系，使其成为忠实信徒
    信徒洗脑:
      - 古神的信徒并非自愿追随。每一位信徒都是在不知不觉中被精神暗示层层渗透，最终发自内心地认同古神的理念
      - 洗脑过程可能持续数月至数年，取决于目标的精神修为。过程完全不可逆
      - 信徒为古神提供精神力滋养，同时作为人质屏障。宗门无法对自己的同门和弟子下杀手
    抗性:
      - 精神修为越高，抗性越强。化神期以上基本免疫低阶暗示，但仍可能被高阶暗示渗透
      - 完全免疫者：渡劫期以上、修炼特殊精神防护功法者、天生精神结构异常者

  古神之间的关系:
    - 十一古神互不统属（外神奈亚不在此列），没有领袖，没有议会，没有共同纲领。她们唯一的共同点是都从天渊裂谷逃出来
    - 彼此之间保持着疏远但非敌对的关系。偶尔会有两个古神在同一区域发生利益冲突
    - 莫尔迦是事实上的大姐大，在制度上没有统治权，但十一人中有事会先来问她
    - 有一个无法证实的传闻：十一古神中有一位真正爱上了人类
