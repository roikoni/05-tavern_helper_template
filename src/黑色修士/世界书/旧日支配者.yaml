---
旧日支配者:
  定位:
    - 旧日支配者是混乱侧高位存在，近似克苏鲁神话中 Great Old Ones 的本土化映射。
    - 她们不是古神。古神来自外星深空并维护秩序；旧日支配者制造混乱、污染梦境、撕裂理智边界。
    - 修仙界早期文献常将旧日支配者误记为“古老之神”“裂谷古神”或“天外古神”，这是历史误称。
    - 现代天机阁第九阁建议统一称为“旧日支配者”，以避免与秩序侧古神混淆。

  起源:
    - 旧日支配者的真实源头不可考。她们可能来自阿撒托斯梦境的深层噩兆，也可能是现实边界破裂后渗入凡世的混乱自我。
    - 太古时代，旧日支配者曾在五域留下污染、欲望、深海低语、梦魇宴会、精神奴役等灾害。
    - 上古旧日战争中，人类先贤几乎败亡。十一位古神循星轨自外星降临，协助人类建立针对克苏鲁的天渊封印。
    - 目前唯一确认被封印的旧日支配者是克苏鲁。其他旧日支配者未正式编入人物，也不默认处于封印状态。
    - 克苏鲁虽被压入天渊裂谷深层，但其梦境低语仍会通过海潮、梦魇、禁忌典籍和精神污染影响外界。

  核心特征:
    混乱:
      - 她们的存在会诱发欲望失控、认知崩解、群体狂热、梦境污染与现实规则错位。
      - 旧日支配者不一定有明确恶意；许多灾难只是她们存在本身对凡世造成的压力。
    污染:
      - 旧日支配者的低语、符号、真名、遗骸、梦境残响都可能污染识海。
      - 污染初期表现为幻听、执念、异常亲近感、对禁忌知识的渴求。
      - 污染后期可能发展为人格崩解、信仰倒置、肉身异化或主动献祭。
    封印:
      - 当前世界唯一明确存在的旧日封印是“克苏鲁封印”。
      - 克苏鲁封印不是单一牢笼，而是由天渊裂谷、古神星轨术式、上古阵法与人类先贤遗愿共同构成的多层系统。
      - 封印越薄弱，克苏鲁越容易通过梦境、海潮、遗迹、信徒或污染物影响外界。

  与古神:
    - 古神是旧日支配者的主要制衡者。她们自外星而来，在旧日战争中帮助人类封印克苏鲁。
    - 旧日支配者会本能地诱导凡人破坏秩序、制造足以让世界远离清醒的混乱。
    - 人类若误把旧日支配者当作古神崇拜，极易被污染利用，最终成为封印破裂的工具。

  与人类:
    - 旧日支配者通常不把人类视为平等对象，而是视作媒介、食粮、梦中变量或可塑材料。
    - 她们可能表现出魅力、温柔、交易意愿或慈悲假象，但核心目的往往是扩散影响、松动封印或寻找新的降临锚点。
    - 与旧日支配者接触时，修士应优先保护神识、自我认知和现实锚点，而非相信口头承诺。

  叙事规则:
    - 写到旧日支配者时，应突出不可名状、精神污染、梦魇逻辑、欲望失控、封印压迫与理智边界崩坏。
    - 不要把旧日支配者写成普通妖魔或单纯邪修；她们的危险来自存在层级与认知污染，而不只是战斗力。
    - 旧日支配者人物后续会逐一编纂。在未正式添加人物前，除克苏鲁封印外，本条只作为世界观底层分类与灾害来源。
    - 若剧情需要让普通人或低阶修士误称旧日支配者为古神，可以保留误称；但系统设定与高阶情报应使用“旧日支配者”。
