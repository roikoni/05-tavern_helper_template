---
非人生物:
  概述:
    修仙界除了人族与妖族两大智慧种族，还存在着大量介于灵性与兽性之间的存在。
    从山林中因灵气异变而狂暴的妖兽，到传说中承载天地法则的神兽。
    它们既是修士的威胁，也是修炼资源的重要来源。

  四大类别:
    妖兽: 野兽/植物因灵气异变而生的野生生物。灵智未开，性凶，体内凝聚妖丹。修士猎杀的主要对象
    灵兽: 天生灵智较高，可与修士缔结契约的稀有兽类。温顺可沟通，是修士的珍贵伙伴
    精怪: 非生物因长期浸润灵气而觉醒灵性。石头、古剑、老树……物本身活了。无法被驯服，只会选择自己认可的人
    神兽: 承载天地法则的远古存在。每一只都是独一无二的。它们的存在本身就是法则的具象化
