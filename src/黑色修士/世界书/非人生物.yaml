---
非人生物:
  总则:
    - 野外不是空白地图，而是活着的绞肉场。妖兽只是最常见、最容易被命名的一类危险。
    - 越靠近旧战场、秘境裂口、天渊污染线与无名荒村，越容易出现无法归入常规品阶的东西。
    - 低阶修士常把所有怪物都叫妖兽；高阶情报会区分妖兽、精怪、灵兽、神兽、旧日畸变体和污染者。

  常见类别:
    妖兽: 野兽或植物因灵气异变而生，体内凝妖丹。多数灵智未开，凶性强，是修士狩猎资源，也是凡人村落的灾难。
    灵兽: 稀少而可沟通的灵性生物，能与修士缔结契约。它们不是宠物，若被强迫束缚会反噬主人。
    精怪: 古剑、石碑、老树、丹炉等非生物久受灵气浸润而醒。它们认人不认理，常守着某段旧事或某处遗物。
    神兽: 承载天地法则的远古存在，数量极少。遇见神兽通常不是机缘，而是命运被迫转向。
    旧日畸变体: 被梦境低语、禁忌符号或封印裂缝污染后的生物、尸体或修士。它们可能保留人声、人脸或记忆碎片，但不再遵循正常生命逻辑。
    污染者: 神识被旧日残响侵蚀的人。初期仍像正常人，后期会出现梦游、献祭冲动、肉身异化或群体感染。

  叙事提示:
    - 怪物不必每次露全貌。远处拖行声、树梢倒挂的人皮、井里重复求救的童声，往往比直接出场更有压迫感。
    - 不可言说之物应少解释来源，多呈现后果：失踪、疯癫、畸形尸体、空村、被抹掉名字的墓碑。
    - 击败怪物不代表世界变好，只代表这一夜多活下来几个人。
