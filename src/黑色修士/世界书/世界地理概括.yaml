---
世界地理:
  世界地图概况:
    大陆整体呈东西宽、南北窄的不规则形状。中州居中央偏东，是面积最大、人口最密、灵气最浓的核心区。
    其余四域环绕中州：东为原始森林与山脉，南为群山，西为荒漠戈壁，北为冰原与无尽海。
    大陆之外是无尽海，海外是否有其他大陆，修仙界尚无定论。出海探索的修士大多没有回来。回来的人说远方有雾，雾中有山，山上有不属于这个时代的建筑。但返航者无人能第二次找到那座山

  地域总览:
    中州: 灵气最浓郁的核心地带，大虞皇朝所在，正道七宗有五宗坐落于此。包含：天京城、万象坊、灵台司、河朔州、云岫州、临江州、东平州
    东荒: 原始森林与古老山脉交错，妖族传统领地。散修与猎妖者聚集。包含：青木城、诸侯七国、人妖共治城邦、万妖林、无主之地
    西漠: 广袤沙漠与戈壁，隐藏大量上古遗迹。魔道势力盘踞之地。包含：天渊关口、血煞宗辖区、幽魂谷辖区、万象魔宗辖区、莫尔迦领地、无属沙海
    南岭: 群山连绵，气候多变，盛产灵草灵矿。丹修与器修的天堂。包含：百草城、炉山镇、斯芬克丝的道观、丹火秘境
    北冥: 极寒冰原与无尽海域，传闻中龙族和远古异兽的栖息地。包含：玄冰城、北海渔港、克茜拉的废弃渔村、无尽海群岛
