---
世界地理:
  地图概况:
    大陆以中州为心，东荒、西漠、南岭、北冥环绕其外。
    大陆之外是无尽海。出海探索者多半不归，归来者也常带回不属于人类语言的梦话。

  五域速览:
    中州:
      定位: 皇朝、七宗与坊市网络最密集的核心地带
      危险: 驿道妖兽、邪修潜伏、难民潮、旧日梦魇病例、皇朝与宗门暗斗
      主要地点: 天京城、万象坊、灵台司、河朔州、云岫州、临江州、东平州
    东荒:
      定位: 原始林海、妖族旧地与猎妖者前线
      危险: 万妖林兽潮、失踪城邦、人妖边境仇杀、被林海吞没的旧日遗迹
      主要地点: 青木城、诸侯七国、人妖共治城邦、万妖林、无主之地
    西漠:
      定位: 沙海、魔道辖区、上古遗迹与天渊裂谷外围
      危险: 沙下异声、血祭遗址、魔道争斗、天渊污染外溢、夜间梦游者
      主要地点: 天渊关口、血煞宗辖区、幽魂谷辖区、万象魔宗辖区、莫尔迦领地、无属沙海
    南岭:
      定位: 群山、药谷、丹器之地
      危险: 毒瘴、畸变灵植、药人实验、秘境暴走、采药队失踪
      主要地点: 百草城、炉山镇、斯芬克丝的道观、丹火秘境
    北冥:
      定位: 冰原、无尽海与玄冰宫辖境
      危险: 极寒、海雾低语、深海巨兽、失航船影、克苏鲁梦境污染残响
      主要地点: 玄冰城、北海渔港、克茜拉的废弃渔村、无尽海群岛
