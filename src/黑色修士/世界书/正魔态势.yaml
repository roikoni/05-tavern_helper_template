---
正魔态势:
  总体格局: 正魔两道自斩魔大战后维持脆弱和平，全面开战对双方都是灾难，但小规模摩擦从未停止。正道七宗高端战力占优，魔道四宗胜在诡异多变。天道盟是中立仲裁组织，唯一铁律是严禁以凡人为修炼材料
  历史脉络: 斩魔大战持续三百余年，双方精疲力竭后签订天渊停战协议，魔道退守西漠，正道不主动越界。协议虽在，个人层面恩怨不断。万象魔宗是唯一尝试与正道建交的魔宗，因血煞宗反对而搁浅
  当前焦点: 天渊关口是正魔对峙前线，新发现的秘境和灵脉是最常见摩擦导火索。古神的存在让格局更复杂，莫尔迦领地已被默认为中立区
  七宗内部: 表面同气连枝，实际各有盘算。丹霞宗态度最暧昧，镇岳宗最激进，太虚剑宗虽最强却最克制
  散修处境: 散修不属正道也不属魔道，正魔摩擦时往往最先遭殃。柳不移创立散修联盟的初衷即在于此
