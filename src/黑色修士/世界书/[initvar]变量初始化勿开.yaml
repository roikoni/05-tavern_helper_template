古神列表:
  莫尔迦:
    神格: 欲望之母
    领域: 愿望调律、秩序庇护与精神屏障
    位阶: 上位神
    状态: 活跃·西漠领主
    信仰: 无强制信仰。西漠天渊裂谷周边三百里绿洲居民普遍受其庇护，精神力场用于安抚噩梦、隔离旧日污染与维持秩序
    描述: 十一古神中最强者。以公开身份在西漠天渊裂谷旧址建立了自己的王国。她傲慢、挑剔、嘴硬，常把救助人类说成“维持秩序”或“嫌麻烦”，但底色是坚定的善意与庇护。
    神迹: 领地笼罩持续性精神力场，能同时安抚数千目标的恐惧与噩梦。神识覆盖范围相当于渡劫期十倍，入其领地者不自觉心情安定，旧日低语被显著削弱。
    收服: false
    神契技能: 欲望权柄
    神契描述: |-
      获得莫尔迦的精神力场调律能力。战斗中每回合自动展开「女王屏障」，己方对恐惧、混乱、旧日低语与精神污染的检定+2。
      主动释放「愿望敕令」：消耗MP 20，指定一名敌方目标，短暂压制其恶意与失控欲望，本场战斗中攻击检定-4；若目标正受旧日污染影响，额外获得一次清醒检定。
      被动「女王威严」：面对精神力低于自身的对手时，先手检定自动+5；该威严不能用于奴役、洗脑或强迫无辜者臣服。
  维拉:
    神格: 欢宴之主
    领域: 欢宴、幻术与梦境安抚
    位阶: 中位神
    状态: 活跃·游走中州
    信仰: 无固定信徒，但中州各城有一批受过她宴席庇护的"宴会常客"，他们自愿交换见闻与消息
    描述: 十一古神中的「欢宴之主」。她看似挥金如土、爱酒爱笑，实则把宴会办成流动的避风处，用灯火、人声与幻梦替疲惫者抵御旧日噩梦。
    神迹: 集体幻梦安抚：宴会即临时心神屏障。酒杯不空、灯火不熄、乐声不断，能舒缓恐惧、混乱与轻度旧日低语；宾客醒后只觉睡过一场好觉，不会被抽取修为或神识。
    收服: false
    神契技能: 欢宴幻梦
    神契描述: |-
      获得维拉的欢宴幻梦之力。被动「不竭之杯」：每场战斗开始自动恢复 20% MP，且 MP 自然回复速率+50%。
      主动释放「盛宴邀请」：消耗MP 25，在指定区域展开幻梦宴席。己方解除一次恐惧/混乱/旧日低语影响；敌方若正处于狂怒、恐惧或污染失控状态，需进行神识检定，失败则本回合行动迟疑。
      被动「微醺步态」：被命中检定每次有 25% 概率因对方误判幻影而失效；该能力不得用于洗脑、强迫沉迷或奴役无辜者。
  斯芬克丝:
    神格: 寂静之唇
    领域: 寂静、共情与解惑
    位阶: 中位神
    状态: 隐居·南岭道观
    信仰: 无固定信徒，只有少数受过她倾听与安抚的求解惑者；他们离开道观后仍保有自己的道路
    描述: 十一古神中最不善社交者。她隐居南岭废弃道观，寡言、怯生却极温柔，擅长用寂静心域让濒临崩溃的人先安静下来，再把选择权交还给对方。
    神迹: 无声问心：展开一片不具强制性的寂静心域，削弱旧日低语、梦魇污染与情绪失控。她能感知来客心绪裂缝，但不会强迫对方吐露秘密，也不会以神谕替人决定人生。
    收服: false
    神契技能: 寂静共情
    神契描述: |-
      获得斯芬克丝的寂静共情之力。被动「读心微光」：每场战斗可感知一名敌方目标的情绪波动，使其首次针对己方的攻击检定-3；该感知不等同于强迫读心或夺取秘密。
      主动释放「寂静之答」：消耗MP 15，指定一名己方或自愿接受帮助的目标，解除一次恐惧/混乱/旧日低语影响，并获得下一次神识抵御检定+3。
      被动「温柔之锁」：免疫所有低于自身位阶的精神暗示与魅惑效果；同时提醒叙事中不得用此神契洗脑、审讯或强迫他人选择。
  拉维妮亚:
    神格: 痴情之锁
    领域: 灵魂誓言、红线护界与恶契斩断
    位阶: 中位神
    状态: 活跃·东荒巡行
    信仰: 无强制信徒。东荒有少数受她救下的女子与散修自愿为她传递恶契、情蛊和奴役事件的消息
    描述: 十一古神之一。红发金眸、成熟明艳，嘴上锋利又骄傲，实则极厌恶以爱为名的控制。她将红线视作守护自愿誓言的界线，也用它斩断情蛊、奴契、洗脑与恶意牵连。
    神迹: 红线护界：以情感、誓言与神识边界编织可见红线，只保护自愿建立的承诺，不强迫任何人臣服。她能追索恶誓、奴契与精神锁印的源头，并将其剪断或反缚施术者。
    收服: false
    神契技能: 红线护誓
    神契描述: |-
      获得拉维妮亚的誓言护界之力。主动释放「红线护誓」：消耗MP 30，指定一名己方或自愿目标，本场战斗中其抵抗魅惑、恐惧、洗脑、情蛊、旧日低语与强制契约的检定+3。
      主动释放「断恶红线」：消耗MP 35，尝试斩断一项外来精神锁印、奴役契约或恶意诅咒；若源头在场，源头下一次精神检定-3。
      被动「自愿之约」：所有红线效果必须建立在自愿、救援或阻止伤害的前提上，不得用于奴役、审讯、洗脑或逼迫无辜者恋慕。
  克茜拉:
    神格: 深渊的低语
    领域: 深海、潮声净化与旧日污染封存
    位阶: 中位神
    状态: 隐居·北冥废弃渔村
    信仰: 无固定信徒。北冥沿海有少数渔民会在出海前点潮灯，感谢她压住海雾中的旧日低语
    描述: 十一古神中最忧郁者。她独居北冥无尽海沿岸废弃渔村，并非为了污染村民，而是守着旧日潮声的裂口。她低语很轻，像替溺水者把最后一句话听完，也像把噩梦一点点压回海底。
    神迹: 潮灯封存：以深海低鸣安抚惊恐神识，削弱旧日低语与梦境污染；废村中的灯火用于收容残魂、遗愿和污染碎片，避免它们继续漂向活人梦中。
    收服: false
    神契技能: 深渊低语
    神契描述: |-
      获得克茜拉的潮声净化之力。主动释放「潮灯低语」：消耗MP 20，指定一名己方或自愿目标，解除一次恐惧、混乱或旧日低语影响，并恢复 D4 San值。
      主动释放「净潮封存」：消耗MP 30，对指定污染源或失控目标施加潮网封存，持续 2 回合；期间其攻击检定-2，若受旧日污染驱使则额外获得一次清醒检定。
      被动「沿海强化」：身处水域/雨天/夜晚时净化、封存与神识防护类效果+15%。
      被动「忧郁安静」：受到的精神攻击伤害-30%，但自身 San 值回复速率减半；不得将此神契写成植入污染、收藏活人或操纵尸体。
  奈亚:
    神格: 千面之影
    领域: 伪装、多重身份、因果拨弄与精神折磨
    位阶: 未知
    状态: 无处不在·身份不明
    信仰: 无
    描述: 外神。不同于古神，也不同于旧日支配者，像从世界边缘探头看戏的千面观众。她同时维持数十个独立身份，每个分身都拥有自己的生活与选择。她喜欢玩弄众生、折磨人心、把凡人的选择与痛苦编成戏剧；偶尔救人，也多半是为了让戏继续演下去。
    神迹: 完美伪装、多重身份、因果拨弄与精神折磨。分身真实可触碰，也被她视作一段段可供观赏的真实人生。无法被常规杀死：只要还有一个身份存世便继续存在。天机阁推演其弱点，结论仅三字："别想了。"
    收服: false
    神契技能: 千面之影
    神契描述: |-
      获得奈亚的多重身份之力。主动释放「身份伪装」：消耗MP 25，本场战斗中可临时伪装成任一已见过的 NPC（含外貌/气息/声音），敌方识破检定难度+5；该伪装可用于潜入、欺骗、诱导、挑拨或折磨目标自我认知。
      主动释放「错位因果」：消耗MP 30，使一名敌方目标下一次行动误判目标或误解局势；若目标神识抵御失败，附加「自疑」1回合，攻击/防御检定-3。
      被动「分身不灭」：气血归零时有 50% 概率以"另一身份"复活，恢复 30% 气血，本场战斗内仅触发一次。
      被动「金色微光」：眼底反光使欺骗、拖延、挑拨、威吓与精神折磨类检定+3，但被熟人近距离凝视超过 3 秒可能露馅。
  胧:
    神格: 戏言之蝶
    领域: 戏言、安抚与蝶影守护
    位阶: 下位神
    状态: 跟随同行者
    信仰: 无
    描述: 十一古神中最小最弱者。二百年前天渊异动后重新现身，长期以玩笑、躲藏和装傻在人世边缘求生。如今跟随一位人类修士同行，嘴硬黏人、风趣狡黠，常把关心包装成戏言；越是在乎别人，越不敢直接承认善意。
    神迹: 戏言蝶影：能将真假混杂的话语化为轻巧术式，误导敌意、安抚恐惧、打断旧日低语。精神暗示能力微弱且短暂，不用于长期洗脑或奴役；关键时刻可发动「真言蝶影」稳定同伴神识。
    收服: true
    神契技能: 戏言之蝶
    神契描述: |-
      获得胧的戏言体质与敏捷特性。被动「蝶之轻语」：语言带有若有若无的安抚与误导力，对NPC说服/安抚/拖延类检定+3；战斗中外表看似柔弱，实则身法+10。
      主动释放「蝶影护行」：消耗MP 10，指定一名场上目标，本回合其对自己或一名己方目标的攻击意图检定-2；若目标受旧日污染影响，额外获得一次清醒检定。
      被动「弱小却灵活」：体力低于 30% 时，闪避检定+4，且可放弃本回合所有动作以带一名相邻同伴获得一次"消失"机会（脱离战斗）。
