古神列表:
  莫尔迦:
    神格: 欲望之母
    领域: 统治与欲望
    位阶: 上位神
    状态: 活跃·西漠领主
    信仰: 西漠天渊裂谷周边三百里绿洲全体居民，拥有精神力共享网络
    描述: 十一古神中最强者。以公开身份在西漠天渊裂谷旧址建立了自己的王国。欲望无边无际却从不越界：坦荡的强势让修仙界既忌惮又无从下手。
    神迹: 领地笼罩持续性精神力场，能同时对数千目标施加暗示。神识覆盖范围相当于渡劫期十倍，入其领地者不自觉心情愉悦、防备降低。
    收服: false
    神契技能: 欲望权柄
    神契描述: |-
      获得莫尔迦的精神力场支配能力。战斗中每回合自动对场上所有敌方目标施加低阶精神暗示，敌方检定-2。
      主动释放「欲望抽取」：消耗MP 20，自身扣除D4 San值，指定一名敌方目标，本场战斗中其所有欲望被抽空，攻击检定永久-4。
      被动「女王威压」：面对精神力低于自身的对手时，先手检定自动+5。
  维拉:
    神格: 欢宴之主
    领域: 欢宴与幻术
    位阶: 中位神
    状态: 活跃·游走中州
    信仰: 无固定信徒，但中州各城有一批"宴会常客"
    描述: 十一古神中最无忧无虑者。她从不在一座城停留超过七日，不收信徒，不立领地，宴罢便走。第二日宿醉中的客人才发现她已不在。
    神迹: 集体幻觉制造：宴会即幻术：酒杯不空、音乐不停。以微量抽取方式同时从数十人身上吸取精神力，被吸取者次日仅感微倦。
    收服: false
    神契技能: 欢宴幻梦
    神契描述: |-
      获得维拉的集体幻术之力。被动「不竭之杯」：每场战斗开始自动恢复 20% MP，且 MP 自然回复速率+50%。
      主动释放「盛宴邀请」：消耗MP 25，使指定区域内所有 NPC（不含古神/外神）陷入沉浸幻觉，本回合丧失行动力，对自己友善度临时+2。
      被动「微醺步态」：被命中检定每次有 25% 概率因对方"产生错觉"而失效。
  斯芬克丝:
    神格: 寂静之唇
    领域: 精神暗示与解惑
    位阶: 中位神
    状态: 隐居·南岭道观
    信仰: 三个信徒（散修、前丹霞宗弟子、迷路少女）
    描述: 十一古神中最不善社交者。南岭群山深处废弃道观隐居二百年。与人说话会紧张到捏碎茶杯。能用精神力帮人解惑却几年才用一次。十一古神中只有她私下觉得人类比自己强。
    神迹: 精神暗示最精妙者，能不知不觉种下暗示种子。拥有共情链接，可感知绑定对象的情绪与需求。十一古神中精神暗示的原始模板。
    收服: false
    神契技能: 寂静共情
    神契描述: |-
      获得斯芬克丝的精神共情之力。被动「读心微光」：每场战斗自动洞察一名敌方目标的下一回合行动，使其首次攻击检定-3。
      主动释放「寂静之答」：消耗MP 15，本回合内对任意一名NPC的提问必得真实回答（含隐情、心声、动机），不可对古神/外神使用。
      被动「温柔之锁」：免疫所有低于自身位阶的精神暗示与魅惑效果。
  拉维妮亚:
    神格: 痴情之锁
    领域: 精神绑定与爱恋
    位阶: 中位神
    状态: 活跃·东荒流浪
    信仰: 最多三个眷属（当前恋人）
    描述: 十一古神中最痴情也最令人心碎者。在东荒独自流浪。每一次爱都真心倾注，但真心会转移。无法控制自己不去爱，也无法控制自己不爱。
    神迹: 一对一深度精神绑定，通过精神联结侵入识海。被绑定者产生不可自拔的真实恋爱感。最多同时绑定三人，绑定解除后对方会陷入严重失恋抑郁。
    收服: false
    神契技能: 痴情之锁
    神契描述: |-
      获得拉维妮亚的精神绑定之力。主动释放「真心倾注」：消耗MP 30，对指定一名敌方目标建立深度绑定，本场战斗中其无法对自己出手且攻击检定-3。
      被动「双向共感」：与被绑定目标共享 20% 受到的伤害，但同时获得其 10% 的属性加成。
      被动「真心转移」：每场战斗结束有 15% 概率"无预兆转移"，自动解除当前所有绑定并恢复 30% 气血。
  克茜拉:
    神格: 深渊的低语
    领域: 精神污染与深海
    位阶: 中位神
    状态: 隐居·北冥渔村
    信仰: 渔村全体居民已被深度污染，皆为她的延伸
    描述: 十一古神中最忧郁者。北冥无尽海沿岸废弃渔村独居。每天傍晚坐海边礁石上。用低语将居民变作"收藏"。暴力安静近乎温柔。被封印伤得最深的一个。
    神迹: 精神污染：缓慢不可逆的意识侵蚀，种子在识海中自我生长数月乃至数年。低语无需语言，是纯粹意识渗透。沿海区域内力量大幅增强。
    收服: false
    神契技能: 深渊低语
    神契描述: |-
      获得克茜拉的精神污染之力。主动释放「低语种子」：消耗MP 20，扣除自身 D4 San值，对指定敌方目标植入污染种子，3 回合后其每回合自损 5% 气血并攻击检定-2。
      被动「沿海强化」：身处水域/雨天/夜晚时所有属性+15%。
      被动「忧郁安静」：受到的精神攻击伤害-30%，但自身 San 值回复速率减半。
  奈亚:
    神格: 千面之影
    领域: 伪装与多重身份
    位阶: 未知
    状态: 无处不在·身份不明
    信仰: 无
    描述: 外神。不同于古神的存在，来自此界之外的未知存在。同时维持数十个独立身份分散各处，每个分身拥有完全独立的性格与人生。眼底金色反光是唯一判别线索。无人知晓真身实力与目的。
    神迹: 完美伪装与多重身份。分身真实可触碰。无法被杀死：只要还有一个身份存世便继续存在。天机阁推演其弱点，结论仅三字："别想了。"
    收服: false
    神契技能: 千面之影
    神契描述: |-
      获得奈亚的多重身份之力。主动释放「身份伪装」：消耗MP 25，本场战斗中可临时伪装成任一已见过的 NPC（含外貌/气息/声音），敌方识破检定难度+5。
      被动「分身不灭」：气血归零时有 50% 概率以"另一身份"复活，恢复 30% 气血，本场战斗内仅触发一次。
      被动「金色微光」：眼底反光使任何欺骗类检定+3，但被熟人近距离凝视超过 3 秒可能露馅。
  胧:
    神格: 戏言之蝶
    领域: 戏言与依附
    位阶: 下位神
    状态: 跟随饲主
    信仰: 无
    描述: 十一古神中最小最弱者。破封二百年始终在生存线上挣扎，后依附于一位人类修士，称其"饲主大人"。风趣幽默、腹黑心机。天生"戏言"体质：每句承诺出口即失效。古神本能会在力量超过饲主时驱动背叛。
    神迹: 通过交合吸取精气恢复力量。拥有微弱精神暗示能力，远不如其他古神，最多只能让目标产生轻微好感。
    收服: true
    神契技能: 戏言之蝶
    神契描述: |-
      获得胧的戏言体质与敏捷特性。被动「蝶之轻语」：语言带有若有若无的诱惑力，对NPC说服/魅惑类检定+3；战斗中外表看似柔弱，实则身法+10。
      主动释放「饲主大人」：消耗MP 10，指定一名场上目标，将其在本场战斗中临时识别为"饲主"，对方对自己的攻击意图检定-2，自身对其攻击检定+1。
      被动「弱小却灵活」：体力低于 30% 时，闪避检定+4，且可放弃本回合所有动作以获得一次"消失"机会（脱离战斗）。
