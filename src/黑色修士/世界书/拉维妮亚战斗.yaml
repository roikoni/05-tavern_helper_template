---
拉维妮亚战斗:
  称号: 痴情之锁
  境界: 合体中期
  战斗风格: 以红线划界、护誓与截断敌意为主，擅长切断诅咒、恶誓和强制契约
  流派: 古神神契
  招牌机制: 誓言护界 + 痴情之锁神契

  六维:
    力道: 65
    体魄: 60
    身法: 75
    灵力: 78
    神识: 72
    根骨: 65

  专属技能:
    断恶刺:
      类型: 法术 / 单体
      消耗: MP 20
      伤害骰: 2d10 + 灵力修正
      检定: 灵力 vs 防御DC
      效果: 若目标正维持奴役、情蛊、精神操控或强制契约，本次伤害额外+20%
      冷却: 1回合

    护誓红线:
      类型: 法术 / 单体 / 防护
      消耗: MP 25
      检定: 灵力 vs 神识抵御DC
      效果: 指定一名己方或自愿目标获得「护誓」2回合；其受到精神控制、魅惑、恐惧或旧日低语影响时抵御检定+4
      冷却: 2回合

    红线截锋:
      类型: 法术 / 单体
      消耗: MP 30
      伤害骰: 3d6 + 灵力修正
      检定: 灵力 vs 闪避DC
      效果: 命中附加「截锋」1回合；目标下一次攻击检定-3，且不得指定受护誓保护的目标
      冷却: 2回合

    真心照誓:
      类型: 法术 / 单体 / 破除
      消耗: MP 40
      检定: 灵力 vs 神识抵御DC
      效果: 命中则驱散目标身上一项强制契约、诅咒锁印或外来精神暗示；若目标为敌方施术者，则本回合无法继续维持该类效果
      冷却: 4回合

  特性:
    真心不折: 每场战斗 1 次，解除自身所有控制状态并恢复 20% HP
    双向护线: 场上存在「护誓」目标时，拉维妮亚可替其承受 20% 伤害；该效果只对自愿接受护誓者生效
