---
维拉战斗:
  称号: 欢宴之主
  境界: 合体中期
  战斗风格: 不喜正面杀伐，擅长铺开幻宴、误导敌意、疏散无辜者并稳住己方心神
  流派: 克苏鲁修
  招牌机制: San 侵蚀（基底）+ 欢宴幻梦神契

  六维:
    力道: 50
    体魄: 55
    身法: 88
    灵力: 85
    神识: 80
    根骨: 70

  专属技能:
    幻影分身:
      类型: 被动 / 场地
      效果: 战斗开始自动展开。每回合生成 1d4 个幻影分身。敌人攻击前投神识检定 vs DC（10 + 神识修正），失败则误判目标；若场上有无辜者，优先将攻击引向空处

    醉仙酿:
      类型: 法术 / 单体 / 非致命
      消耗: MP 25
      伤害骰: 2d8 + 灵力修正
      检定: 灵力 vs 闪避DC
      效果: 命中附加「微醺」2回合，目标速度下降，若目标受旧日污染影响，额外进行一次清醒检定
      冷却: 2回合

    琼浆瀑:
      类型: 法术 / 群体 / 庇护
      消耗: MP 35
      伤害骰: 2d6 + 灵力修正
      检定: 灵力 vs 闪避DC（范围内全体）
      效果: 对敌造成精神冲击并打断施法；对己方形成一层「暖灯」护幕，本回合对恐惧、混乱与旧日低语检定+2
      冷却: 3回合

  特性:
    千灯不熄: 极少直接造成 HP 伤害。每 3 回合为己方恢复 1 San值，并使受旧日污染影响的敌方进行一次清醒检定；她的宴会用于安抚与隔绝污染，不会永久囚禁宾客
    一走了之: HP 降至 50% 以下时直接消失，脱离战斗
    免疫反击: 攻击幻影不算攻击维拉。反击维拉须先通过神识检定找到真身
