---
维拉战斗:
  称号: 欢宴之主
  境界: 合体中期
  战斗风格: 本体不直接战斗，通过幻影分身与酒宴法术周旋
  流派: 克苏鲁修
  招牌机制: San 侵蚀（基底）+ 欢宴幻梦神契

  六维:
    力道: 50
    体魄: 55
    身法: 88
    灵力: 85
    神识: 80
    根骨: 70

  专属技能:
    幻影分身:
      类型: 被动 / 场地
      效果: 战斗开始自动展开。每回合生成 1d4 个幻影分身。敌人攻击前投神识检定 vs DC（10 + 神识修正），失败则攻击落空

    醉仙酿:
      类型: 法术 / 单体
      消耗: MP 25
      伤害骰: 2d8 + 灵力修正
      检定: 灵力 vs 闪避DC
      效果: 命中附加「减速」2回合
      冷却: 2回合

    琼浆瀑:
      类型: 法术 / 群体
      消耗: MP 35
      伤害骰: 2d6 + 灵力修正
      检定: 灵力 vs 闪避DC（范围内全体）
      冷却: 3回合

  特性:
    不杀之杀: 极少直接造成 HP 伤害。每 3 回合自动对全场造成 1 San值扣除。San值归零者不会死，永久留在她的宴会成为「常客」
    一走了之: HP 降至 50% 以下时直接消失，脱离战斗
    免疫反击: 攻击幻影不算攻击维拉。反击维拉须先通过神识检定找到真身
